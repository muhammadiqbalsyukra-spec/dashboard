<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Monitoring Tools</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color: #e2e8f0;
}

/* Container */
.container {
  padding: 15px;
}

/* Card modern */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* Header */
header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* Input */
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
}

input {
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
}

/* Stats */
.stats {
  display: flex;
  gap: 10px;
}

.stat {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
}

.stat h3 {
  margin: 5px 0;
  font-size: 18px;
}

/* Filter */
.filter {
  display: flex;
  gap: 10px;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 10px;
  text-align: left;
}

tr {
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<header>📊 Sales Monitoring Tools</header>

<div class="container">

  <!-- INPUT -->
  <div class="card">
    <h3>Input Penjualan</h3>
    <input type="text" id="toko" placeholder="Nama Toko">
    <input type="number" id="omset" placeholder="Omset (contoh: 5000000)">
    <button onclick="simpan()">Simpan Penjualan</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <p>Omset Hari Ini</p>
      <h3 id="totalOmset">Rp 0</h3>
    </div>
    <div class="stat">
      <p>EC Hari Ini</p>
      <h3 id="ec">0</h3>
    </div>
    <div class="stat">
      <p>Avg / Toko</p>
      <h3 id="avg">Rp 0</h3>
    </div>
  </div>

  <!-- FILTER -->
  <div class="card">
    <h3>Filter Tanggal</h3>
    <div class="filter">
      <input type="date" id="start">
      <input type="date" id="end">
    </div>
    <button onclick="render()">Terapkan</button>
  </div>

  <!-- GRAFIK -->
  <div class="card">
    <h3>Grafik Omset Harian</h3>
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <div class="card">
    <h3>Laporan Penjualan</h3>
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Omset</th>
        </tr>
      </thead>
      <tbody id="tableData"></tbody>
    </table>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sales")) || [];
let chart;

// FORMAT RUPIAH AMAN
function formatRupiah(angka) {
  angka = Number(angka);
  if (isNaN(angka)) return "Rp 0";
  return "Rp " + angka.toLocaleString("id-ID");
}

// SIMPAN DATA
function simpan() {
  const toko = document.getElementById("toko").value.trim();
  let omset = document.getElementById("omset").value;

  omset = Number(omset);

  if (!toko || isNaN(omset) || omset <= 0) {
    alert("Input tidak valid!");
    return;
  }

  const tanggal = new Date().toISOString().split("T")[0];

  data.push({ toko, omset, tanggal });
  localStorage.setItem("sales", JSON.stringify(data));

  document.getElementById("toko").value = "";
  document.getElementById("omset").value = "";

  render();
}

// RENDER
function render() {
  const today = new Date().toISOString().split("T")[0];

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  let filtered = [...data];

  if (start && end) {
    filtered = filtered.filter(d => d.tanggal >= start && d.tanggal <= end);
  }

  filtered.sort((a,b)=> new Date(a.tanggal)-new Date(b.tanggal));

  // DATA HARI INI
  let todayData = data.filter(d => d.tanggal === today);

  let total = todayData.reduce((a,b)=>a+b.omset,0);
  let ec = todayData.length;
  let avg = ec ? Math.round(total/ec) : 0;

  document.getElementById("totalOmset").innerText = formatRupiah(total);
  document.getElementById("ec").innerText = ec;
  document.getElementById("avg").innerText = formatRupiah(avg);

  // GRAFIK
  let perHari = {};
  filtered.forEach(d=>{
    perHari[d.tanggal] = (perHari[d.tanggal] || 0) + d.omset;
  });

  let labels = Object.keys(perHari);
  let values = Object.values(perHari);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Omset Harian',
        data: values,
        tension: 0.3,
        fill: true
      }]
    }
  });

  // TABLE
  let rows = "";
  filtered.slice().reverse().forEach(d=>{
    rows += `
      <tr>
        <td>${d.tanggal}</td>
        <td>${d.toko}</td>
        <td>${formatRupiah(d.omset)}</td>
      </tr>
    `;
  });

  document.getElementById("tableData").innerHTML = rows;
}

render();
</script>

</body>
</html>
