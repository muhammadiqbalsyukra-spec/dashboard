<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Monitoring Tools</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color: #e2e8f0;
}

.container { padding: 15px; }

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

input, button, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  outline: none;
}

input, select {
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
}

.stats { display: flex; gap: 10px; }

.stat {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
}

.filter { display: flex; gap: 10px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px; }
tr { border-bottom: 1px solid rgba(255,255,255,0.1); }

.tools-box { position: relative; }
.tools-menu {
  display: none;
  margin-top: 10px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
}
.tools-menu.active { display: block; }

.action-btn {
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-right: 5px;
  cursor: pointer;
}
.edit { background: orange; }
.delete { background: red; }

.hidden { display: none; }
</style>
</head>

<body>

<header>📊 Sales Monitoring</header>

<div class="container">

<div class="card">
  <h3>Input Penjualan</h3>
  <input type="text" id="toko" placeholder="Nama Toko">
  <input type="number" id="omset" placeholder="Omset">
  <button onclick="simpan()">Simpan</button>
</div>

<div class="card tools-box">
  <button onclick="toggleTools()">🛠 Tools</button>
  <div class="tools-menu" id="toolsMenu">
    <button onclick="toggleEdit()">Mode Edit ON/OFF</button>
    <select id="chartType" onchange="render()">
      <option value="line">Grafik Line</option>
      <option value="bar">Grafik Bar</option>
    </select>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <p>Omset Hari Ini</p>
    <h3 id="totalOmset">Rp 0</h3>
  </div>
  <div class="stat">
    <p>EC Hari Ini</p>
    <h3 id="ec">0</h3>
  </div>
  <div class="stat">
    <p>Avg / Toko</p>
    <h3 id="avg">Rp 0</h3>
  </div>
</div>

<div class="card">
  <h3>Filter</h3>
  <div class="filter">
    <input type="date" id="start">
    <input type="date" id="end">
  </div>
  <button onclick="render()">Terapkan</button>
</div>

<div class="card">
  <h3>Grafik</h3>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>Laporan</h3>
  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Toko</th>
        <th>Omset</th>
        <th class="aksiCol hidden">Aksi</th>
      </tr>
    </thead>
    <tbody id="tableData"></tbody>
  </table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sales")) || [];
let chart;
let editMode = false;

function formatRupiah(a){
  a = Number(a);
  if(isNaN(a)) return "Rp 0";
  return "Rp " + a.toLocaleString("id-ID");
}

function toggleTools(){
  document.getElementById("toolsMenu").classList.toggle("active");
}

function toggleEdit(){
  editMode = !editMode;
  document.querySelector(".aksiCol").classList.toggle("hidden", !editMode);
  render();
}

function simpan(){
  let toko = document.getElementById("toko").value.trim();
  let omset = Number(document.getElementById("omset").value);

  if(!toko || isNaN(omset) || omset<=0){
    alert("Input salah!");
    return;
  }

  let tanggal = new Date().toISOString().split("T")[0];
  data.push({toko,omset,tanggal});

  localStorage.setItem("sales",JSON.stringify(data));
  render();
}

function editData(index){
  let d = data[index];
  let toko = prompt("Edit toko", d.toko);
  let omset = prompt("Edit omset", d.omset);

  if(!toko || isNaN(omset)) return;

  data[index] = { ...d, toko, omset: Number(omset) };
  localStorage.setItem("sales",JSON.stringify(data));
  render();
}

function deleteData(index){
  if(confirm("Hapus data?")){
    data.splice(index,1);
    localStorage.setItem("sales",JSON.stringify(data));
    render();
  }
}

function render(){
  let today = new Date().toISOString().split("T")[0];

  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  let filtered = data.map((d,i)=>({...d,index:i}));

  if(start && end){
    filtered = filtered.filter(d=>d.tanggal>=start && d.tanggal<=end);
  }

  filtered.sort((a,b)=>new Date(a.tanggal)-new Date(b.tanggal));

  let todayData = data.filter(d=>d.tanggal===today);

  let total = todayData.reduce((a,b)=>a+b.omset,0);
  let ec = todayData.length;
  let avg = ec ? Math.round(total/ec) : 0;

  document.getElementById("totalOmset").innerText = formatRupiah(total);
  document.getElementById("ec").innerText = ec;
  document.getElementById("avg").innerText = formatRupiah(avg);

  let perHari={};
  filtered.forEach(d=>{
    perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset;
  });

  let labels = Object.keys(perHari);
  let values = Object.values(perHari);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: document.getElementById("chartType").value,
    data: {
      labels: labels,
      datasets: [{
        label: "Omset Harian",
        data: values,
        borderWidth: 3,
        borderColor: "#38bdf8",
        backgroundColor: "rgba(56,189,248,0.2)",
        tension: 0.4,
        fill: true,
        pointRadius: 5,
        pointBackgroundColor: "#22c55e"
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "#e2e8f0" }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              return "Rp " + context.raw.toLocaleString("id-ID");
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#cbd5f5" },
          grid: { color: "rgba(255,255,255,0.1)" }
        },
        y: {
          beginAtZero: true,
          ticks: {
            color: "#cbd5f5",
            callback: function(value) {
              return "Rp " + value.toLocaleString("id-ID");
            }
          },
          grid: { color: "rgba(255,255,255,0.15)" }
        }
      }
    }
  });

  let rows="";
  filtered.slice().reverse().forEach(d=>{
    rows+=`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${formatRupiah(d.omset)}</td>
      ${
        editMode ? `
        <td>
          <button class="action-btn edit" onclick="editData(${d.index})">Edit</button>
          <button class="action-btn delete" onclick="deleteData(${d.index})">Hapus</button>
        </td>` : ""
      }
    </tr>`;
  });

  document.getElementById("tableData").innerHTML = rows;
}

render();
</script>

</body>
</html>
