<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Level 3</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:sans-serif;display:flex;}
.sidebar{width:200px;background:#0f172a;padding:20px;}
.menu{padding:10px;cursor:pointer}
.menu:hover{background:#3b82f6}
.main{flex:1;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
img{max-width:80px;border-radius:6px}
</style>
</head>

<body>

<div class="sidebar">
  <div class="menu" onclick="show('input')">Input</div>
  <div class="menu" onclick="show('laporan')">Laporan</div>
</div>

<div class="main">

<h3 id="userInfo">Belum login</h3>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<div id="input">
  <div class="card">
    <input id="toko" placeholder="Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">
    <input type="file" id="foto">
    <button onclick="simpan()">Simpan</button>
  </div>
</div>

<div id="laporan" style="display:none">
  <div class="card">
    <table width="100%">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Omset</th>
          <th>Foto</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};


firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();
const storage=firebase.storage();

let role="staff";
let data=[];

function show(id){
  input.style.display="none";
  laporan.style.display="none";
  document.getElementById(id).style.display="block";
}

// LOGIN
async function login(){
  let email=prompt("Email");
  let pass=prompt("Password");
  let user=await auth.signInWithEmailAndPassword(email,pass);

  // ROLE SIMPLE
  if(email.includes("admin")) role="admin";
}

// LOGOUT
function logout(){auth.signOut();}

// AUTH STATE
auth.onAuthStateChanged(u=>{
  if(u){
    userInfo.innerText="Login: "+u.email+" ("+role+")";
  }else{
    userInfo.innerText="Belum login";
  }
});

// SIMPAN + FOTO
async function simpan(){
  let file=foto.files[0];
  let url="";

  if(file){
    let ref=storage.ref("nota/"+Date.now());
    await ref.put(file);
    url=await ref.getDownloadURL();
  }

  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    foto:url
  });
}

// LOAD
db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

// DELETE (ADMIN ONLY)
async function del(id){
  if(role!=="admin") return alert("Admin only!");
  await db.collection("sales").doc(id).delete();
}

// RENDER
function render(){
  table.innerHTML=data.map(d=>`
  <tr>
    <td>${d.tanggal}</td>
    <td>${d.toko}</td>
    <td>${d.omset}</td>
    <td>${d.foto?`<a href="${d.foto}" target="_blank"><img src="${d.foto}"></a>`:"-"}</td>
    <td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
  </tr>
  `).join("");
}
</script>

</body>
</html>
