<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:
  radial-gradient(circle at top left,#1e3a8a,#020617 40%),
  radial-gradient(circle at bottom right,#0f172a,#020617 50%);
  color:#e2e8f0;
  min-height:100vh;
  overflow-x:hidden;
}

#loginPage{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:420px;
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(15px);
  border-radius:24px;
  padding:30px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.login-title{
  font-size:32px;
  font-weight:700;
  margin-bottom:25px;
}

#app{
  display:none;
  opacity:0;
  transition:.3s;
  width:100%;
  min-height:100vh;
}

#app.show{
  display:flex;
  opacity:1;
}

.sidebar{
  width:260px;
  flex-shrink:0;
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(18px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:25px 18px;
  position:sticky;
  top:0;
  height:100vh;
}

.sidebar h3{
  font-size:26px;
  margin-bottom:35px;
  font-weight:700;
}

.menu{
  padding:14px 16px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
  color:#cbd5e1;
}

.menu:hover{
  background:rgba(59,130,246,.15);
  transform:translateX(4px);
}

.menu.active{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;
  box-shadow:0 10px 25px rgba(37,99,235,.35);
}

.main{
  flex:1;
  width:100%;
  min-width:0;
  padding:30px;
}

#userInfo{
  display:inline-block;
  margin-bottom:20px;
  padding:14px 18px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  font-size:14px;
}

.card{
  width:100%;
  background:rgba(15,23,42,.65);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(15px);
  padding:24px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:
  0 10px 30px rgba(0,0,0,.25),
  inset 0 1px 1px rgba(255,255,255,.04);
}

.card h3{
  font-size:28px;
  font-weight:700;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.stat{
  position:relative;
  overflow:hidden;
  border-radius:22px;
  padding:28px;
  background:linear-gradient(135deg,rgba(59,130,246,.9),rgba(6,182,212,.8));
  box-shadow:0 15px 35px rgba(59,130,246,.25);
}

.stat h2{
  font-size:32px;
  margin-bottom:10px;
}

input,
select{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  outline:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:white;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:14px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.table-wrapper{
  overflow-x:auto;
}

.table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

.table th,
.table td{
  padding:16px;
  font-size:14px;
}

.table td{
  border-bottom:1px solid rgba(255,255,255,.06);
}

.chart-box{
  position:relative;
  width:100%;
  height:340px;
}

canvas{
  width:100% !important;
  height:100% !important;
}

.small{
  font-size:13px;
  margin-top:10px;
  opacity:.7;
}

.hidden{
  display:none !important;
}

@media(max-width:900px){

  #app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
    display:flex;
    gap:10px;
    overflow-x:auto;
  }

  .sidebar h3{
    display:none;
  }

  .main{
    padding:16px;
  }

}

</style>
</head>
<body>

<div id="loginPage">

  <div class="login-card">

    <div class="login-title">
      Sales Login
    </div>

    <input id="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">
      Login
    </button>

    <button onclick="register()">
      Register
    </button>

  </div>

</div>

<div id="app">

  <div class="sidebar">

    <h3>IQBAL</h3>

    <div class="menu active" onclick="showPage('dashboard',this)">
      📊 Dashboard
    </div>

    <div class="menu" onclick="showPage('input',this)">
      ➕ Input
    </div>

    <div class="menu" onclick="showPage('laporan',this)">
      📑 Laporan
    </div>

    <div class="menu" onclick="logout()">
      🚪 Logout
    </div>

  </div>

  <div class="main">

    <div id="userInfo"></div>

    <div id="dashboard">

      <div class="card">

        <select id="filterCabang" onchange="render()"></select>

      </div>

      <div class="grid">

        <div class="stat">
          <h2 id="total">Rp 0</h2>
          <p>Total Omset</p>
        </div>

        <div class="stat">
          <h2 id="trx">0</h2>
          <p>Total Transaksi</p>
        </div>

        <div class="stat">
          <h2 id="avg">Rp 0</h2>
          <p>Rata-rata Omset</p>
        </div>

      </div>

      <div class="grid">

        <div class="card">

          <h3>📊 Omset Harian</h3>

          <div class="chart-box">
            <canvas id="chart"></canvas>
          </div>

        </div>

        <div class="card">

          <h3>👤 Per Sales</h3>

          <div class="chart-box">
            <canvas id="chartSales"></canvas>
          </div>

        </div>

      </div>

    </div>

    <div id="input" class="hidden">

      <div class="card">

        <h3>Input Data Sales</h3>

        <input id="toko" placeholder="Nama Toko">

        <input type="date" id="tanggal">

        <input id="omset" type="number" placeholder="Nominal Omset">

        <select id="inputSales"></select>

        <div class="small">
          Sales aktif:
          <b id="infoCabang"></b>
        </div>

        <button onclick="simpan()">
          Simpan Data
        </button>

      </div>

    </div>

    <div id="laporan" class="hidden">

      <div class="card">

        <div class="table-wrapper">

          <table class="table">

            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Toko</th>
                <th>Sales</th>
                <th>Omset</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody id="table"></tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let data = [];
let salesList = [];

let chartInstance;
let chartSalesInstance;

let monthlyTarget = 0;

window.onload = ()=>{

  tanggal.value =
  new Date()
  .toISOString()
  .split("T")[0];

};

auth.onAuthStateChanged(async user=>{

  if(user){

    loginPage.classList.add("hidden");
    app.classList.add("show");

    let doc = await db
    .collection("users")
    .doc(user.uid)
    .get();

    let sales =
    doc.data()?.sales || "Sales 1";

    userInfo.innerText =
    user.email;

    infoCabang.innerText =
    sales;

    render();

  }else{

    loginPage.classList.remove("hidden");
    app.classList.remove("show");

  }

});

async function login(){

  try{

    await auth
    .signInWithEmailAndPassword(
      email.value,
      password.value
    );

  }catch(err){

    alert(err.message);

  }

}

async function register(){

  try{

    let user =
    await auth
    .createUserWithEmailAndPassword(
      email.value,
      password.value
    );

    await db
    .collection("users")
    .doc(user.user.uid)
    .set({

      role:"staff",

      sales:"Sales 1"

    });

    alert("Register berhasil");

  }catch(err){

    alert(err.message);

  }

}

function logout(){

  auth.signOut();

}

function showPage(id,el){

  ["dashboard","input","laporan"]
  .forEach(x=>{

    document
    .getElementById(x)
    .classList.add("hidden");

  });

  document
  .getElementById(id)
  .classList.remove("hidden");

  document
  .querySelectorAll(".menu")
  .forEach(m=>
    m.classList.remove("active")
  );

  el.classList.add("active");

}

db.collection("salesList")
.onSnapshot(async snap=>{

  salesList =
  snap.docs.map(d=>d.data().nama);

  if(salesList.length === 0){

    await db.collection("salesList")
    .add({
      nama:"Sales 1"
    });

    await db.collection("salesList")
    .add({
      nama:"Sales 2"
    });

    return;

  }

  inputSales.innerHTML =
  salesList.map(c=>`
    <option value="${c}">
      ${c}
    </option>
  `).join("");

  filterCabang.innerHTML =
  '<option value="">Semua Sales</option>' +

  salesList.map(c=>`
    <option value="${c}">
      ${c}
    </option>
  `).join("");

});

// TARGET BULANAN

db.collection("targets")
.onSnapshot(snap=>{

  let bulanSekarang =
  new Date()
  .toISOString()
  .slice(0,7);

  monthlyTarget = 0;

  snap.docs.forEach(doc=>{

    let d = doc.data();

    if(d.bulan === bulanSekarang){

      monthlyTarget =
      Number(d.target || 0);

    }

  });

  render();

});

// DATA SALES

db.collection("sales")
.onSnapshot(snap=>{

  data =
  snap.docs.map(d=>{

    let item = {
      ...d.data(),
      id:d.id
    };

    if(item.cabang && !item.sales){

      item.sales = item.cabang;

    }

    if(item.sales === "Cabang A"){

      item.sales = "Sales 1";

    }

    return item;

  });

  render();

});

// SIMPAN

async function simpan(){

  if(
    !toko.value ||
    !tanggal.value ||
    !omset.value
  ){

    alert("Lengkapi data");
    return;

  }

  await db.collection("sales")
  .add({

    toko:toko.value,

    tanggal:tanggal.value,

    omset:Number(omset.value),

    sales:inputSales.value

  });

  toko.value = "";
  omset.value = "";

  alert("Data berhasil disimpan");

}

// RENDER

function render(){

  let sales =
  filterCabang.value;

  let filtered =
  data.filter(d=>{

    if(sales && d.sales !== sales)
    return false;

    return true;

  });

  filtered.sort((a,b)=>
    new Date(b.tanggal)
    - new Date(a.tanggal)
  );

  let totalVal =
  filtered.reduce((a,b)=>
    a + b.omset
  ,0);

  total.innerText =
  rp(totalVal);

  trx.innerText =
  filtered.length;

  avg.innerText =
  rp(
    filtered.length
    ? totalVal / filtered.length
    : 0
  );

  // TARGET

  let gap =
  monthlyTarget - totalVal;

  if(gap < 0)
  gap = 0;

  let progress =
  monthlyTarget
  ? Math.round(
    (totalVal / monthlyTarget) * 100
  )
  : 0;

  console.log("TARGET:", monthlyTarget);
  console.log("GAP:", gap);
  console.log("PROGRESS:", progress + "%");

  // CHART HARIAN

  let perHari = {};

  filtered.forEach(d=>{

    perHari[d.tanggal] =
    (perHari[d.tanggal] || 0)
    + d.omset;

  });

  let sortedTanggal =
  Object.keys(perHari)
  .sort((a,b)=>
    new Date(a)
    - new Date(b)
  );

  let sortedValues =
  sortedTanggal.map(t=>perHari[t]);

  let warnaBars =
  sortedValues.map(v=>{

    if(v >= 10000000)
    return '#22c55e';

    if(v >= 5000000)
    return '#3b82f6';

    if(v >= 1000000)
    return '#f59e0b';

    return '#ef4444';

  });

  if(chartInstance)
  chartInstance.destroy();

  chartInstance =
  new Chart(chart,{

    type:'bar',

    data:{

      labels:sortedTanggal,

      datasets:[{

        data:sortedValues,

        borderRadius:14,
        borderSkipped:false,

        backgroundColor:warnaBars

      }]

    },

    options:{

      responsive:true,
      maintainAspectRatio:false,

      plugins:{
        legend:{
          display:false
        }
      }

    }

  });

  // CHART SALES

  let perSales = {};

  filtered.forEach(d=>{

    perSales[d.sales] =
    (perSales[d.sales] || 0)
    + d.omset;

  });

  let salesValues =
  Object.values(perSales);

  let salesColors =
  salesValues.map(v=>{

    if(v >= 10000000)
    return '#22c55e';

    if(v >= 5000000)
    return '#3b82f6';

    if(v >= 1000000)
    return '#f59e0b';

    return '#ef4444';

  });

  if(chartSalesInstance)
  chartSalesInstance.destroy();

  chartSalesInstance =
  new Chart(chartSales,{

    type:'bar',

    data:{

      labels:Object.keys(perSales),

      datasets:[{

        data:salesValues,

        borderRadius:12,
        borderSkipped:false,

        backgroundColor:salesColors

      }]

    },

    options:{

      responsive:true,
      maintainAspectRatio:false,

      plugins:{
        legend:{
          display:false
        }
      }

    }

  });

  // TABLE

  table.innerHTML =
  filtered.map(d=>`

    <tr>

      <td>${d.tanggal}</td>

      <td>${d.toko}</td>

      <td>${d.sales}</td>

      <td>${rp(d.omset)}</td>

      <td>
        <button onclick="del('${d.id}')">
          Hapus
        </button>
      </td>

    </tr>

  `).join("");

}

function rp(a){

  return "Rp " +
  Number(a || 0)
  .toLocaleString("id-ID");

}

async function del(id){

  await db.collection("sales")
  .doc(id)
  .delete();

}

</script>

</body>
</html>
