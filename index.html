<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:#e2e8f0;
  overflow-x:hidden;
}

.hidden{
  display:none!important;
}

button{
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  opacity:.95;
}

input,
select,
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
}

input,
select{
  background:rgba(255,255,255,.06);
  color:white;
}

button{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;
}

.card{
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(14px);
}

#loginPage{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:420px;
}

#app{
  display:none;
}

#app.show{
  display:flex;
}

.sidebar{
  width:250px;
  min-height:100vh;
  padding:20px;
  background:#0f172a;
}

.menu{
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
}

.menu.active{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.main{
  flex:1;
  padding:24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.stat{
  padding:24px;
  border-radius:22px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.chart-box{
  height:320px;
}

.table-wrapper{
  overflow:auto;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th,
.table td{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.loading{
  margin-top:10px;
  font-size:13px;
  opacity:.8;
}

.progress-bar{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

.progress-fill{
  height:100%;
  width:0%;
  transition:.4s;
  background:#22c55e;
}

@media(max-width:900px){

  #app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    min-height:auto;
    display:flex;
    gap:10px;
    overflow:auto;
  }

}

</style>
</head>
<body>

<div id="loginPage">

  <div class="card login-card">

    <h1>Sales Dashboard</h1>

    <input id="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <button onclick="register()">Register</button>

  </div>

</div>

<div id="app">

  <div class="sidebar">

    <div class="menu active" onclick="showPage('dashboard',this)">
      Dashboard
    </div>

    <div class="menu" onclick="showPage('inputPage',this)">
      Input
    </div>

    <div class="menu" onclick="showPage('laporanPage',this)">
      Laporan
    </div>

    <div class="menu" onclick="logout()">
      Logout
    </div>

  </div>

  <div class="main">

    <div id="dashboard">

      <div class="grid">

        <div class="stat">
          <h2 id="totalOmset">Rp 0</h2>
          <p>Total Omset</p>
        </div>

        <div class="stat">
          <h2 id="totalTrx">0</h2>
          <p>Total Transaksi</p>
        </div>

      </div>

      <div class="card">

        <div class="chart-box">
          <canvas id="chartOmset"></canvas>
        </div>

      </div>

    </div>

    <div id="inputPage" class="hidden">

      <div class="card">

        <h3>Input Penjualan</h3>

        <input id="toko" placeholder="Nama toko">

        <input id="tanggal" type="date">

        <input id="omset" type="number" placeholder="Nominal omset">

        <select id="salesSelect"></select>

        <input type="file" id="notaFile" accept="image/*">

        <button onclick="scanNota()">
          Scan Nota OCR
        </button>

        <div id="ocrStatus" class="loading"></div>

        <button onclick="saveData()">
          Simpan Data
        </button>

      </div>

    </div>

    <div id="laporanPage" class="hidden">

      <div class="card table-wrapper">

        <table class="table">

          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Toko</th>
              <th>Sales</th>
              <th>Omset</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

// =========================
// FIREBASE CONFIG
// =========================

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// =========================
// GLOBAL STATE
// =========================

let salesData = [];
let salesList = [];
let chartInstance;

// =========================
// INITIAL
// =========================

window.onload = ()=>{

  tanggal.value = new Date()
  .toISOString()
  .split('T')[0];

};

// =========================
// AUTH
// =========================

async function login(){

  try{

    await auth.signInWithEmailAndPassword(
      email.value,
      password.value
    );

  }catch(err){

    alert(err.message);

  }

}

async function register(){

  try{

    await auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    );

    alert('Register berhasil');

  }catch(err){

    alert(err.message);

  }

}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{

  if(user){

    loginPage.classList.add('hidden');
    app.classList.add('show');

    loadData();

  }else{

    loginPage.classList.remove('hidden');
    app.classList.remove('show');

  }

});

// =========================
// PAGE
// =========================

function showPage(id,el){

  ['dashboard','inputPage','laporanPage']
  .forEach(page=>{
    document
    .getElementById(page)
    .classList.add('hidden');
  });

  document
  .getElementById(id)
  .classList.remove('hidden');

  document
  .querySelectorAll('.menu')
  .forEach(m=>m.classList.remove('active'));

  el.classList.add('active');

}

// =========================
// OCR
// =========================

async function scanNota(){

  const file = notaFile.files[0];

  if(!file){
    alert('Pilih foto nota');
    return;
  }

  ocrStatus.innerText = 'Scanning OCR...';

  try{

    const result = await Tesseract.recognize(
      file,
      'eng'
    );

    const text = result.data.text;

    const nominal = extractNominal(text);

    if(nominal > 0){

      omset.value = nominal;

      ocrStatus.innerText =
      '✅ OCR berhasil membaca nominal';

    }else{

      ocrStatus.innerText =
      '⚠️ Nominal tidak ditemukan';

    }

  }catch(err){

    console.error(err);

    ocrStatus.innerText =
    '❌ OCR gagal';

  }

}

function extractNominal(text){

  const numbers = text.match(/\d+[.,]?\d+/g);

  if(!numbers) return 0;

  let terbesar = 0;

  numbers.forEach(num=>{

    const val = Number(
      num.replace(/\./g,'')
         .replace(/,/g,'')
    );

    if(val > terbesar){
      terbesar = val;
    }

  });

  return terbesar;

}

// =========================
// DATABASE
// =========================

async function saveData(){

  if(
    !toko.value ||
    !tanggal.value ||
    !omset.value
  ){
    alert('Lengkapi data');
    return;
  }

  await db.collection('sales').add({

    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    sales:salesSelect.value

  });

  toko.value = '';
  omset.value = '';

  alert('Data berhasil disimpan');

}

function loadData(){

  db.collection('sales')
  .onSnapshot(snap=>{

    salesData = snap.docs.map(doc=>({
      ...doc.data(),
      id:doc.id
    }));

    renderDashboard();
    renderTable();

  });

}

// =========================
// RENDER
// =========================

function renderDashboard(){

  const total = salesData
  .reduce((a,b)=>a+b.omset,0);

  totalOmset.innerText = rp(total);

  totalTrx.innerText = salesData.length;

  renderChart();

}

function renderChart(){

  let perHari = {};

  salesData.forEach(item=>{

    perHari[item.tanggal] =
    (perHari[item.tanggal] || 0)
    + item.omset;

  });

  const labels = Object.keys(perHari);
  const values = Object.values(perHari);

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(chartOmset,{

    type:'bar',

    data:{

      labels:labels,

      datasets:[{

        data:values,
        borderRadius:12

      }]

    },

    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false}
      }
    }

  });

}

function renderTable(){

  tableBody.innerHTML = salesData.map(item=>`

    <tr>

      <td>${item.tanggal}</td>
      <td>${item.toko}</td>
      <td>${item.sales}</td>
      <td>${rp(item.omset)}</td>

      <td>

        <button onclick="hapus('${item.id}')">
          Hapus
        </button>

      </td>

    </tr>

  `).join('');

}

// =========================
// DELETE
// =========================

async function hapus(id){

  const ok = confirm(
    'Yakin ingin hapus data?'
  );

  if(!ok) return;

  await db.collection('sales')
  .doc(id)
  .delete();

}

// =========================
// HELPER
// =========================

function rp(nominal){

  return 'Rp ' +
  Number(nominal || 0)
  .toLocaleString('id-ID');

}

</script>
</body>
</html>
