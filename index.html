<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:
  radial-gradient(circle at top left,#1e3a8a,#020617 40%),
  radial-gradient(circle at bottom right,#0f172a,#020617 50%);
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(18px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:25px 18px;
  position:sticky;
  top:0;
  height:100vh;
}

.sidebar h3{
  font-size:24px;
  margin-bottom:35px;
  font-weight:700;
  letter-spacing:.5px;
}

.menu{
  padding:14px 16px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
  color:#cbd5e1;
}

.menu:hover{
  background:rgba(59,130,246,.15);
  transform:translateX(5px);
}

.active{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;
  box-shadow:0 10px 25px rgba(37,99,235,.35);
}

/* MAIN */

.main{
  flex:1;
  padding:30px;
  width:100%;
  max-width:1400px;
  margin:auto;
}

/* CARD */

.card{
  background:rgba(15,23,42,.65);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(15px);
  padding:24px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:
  0 10px 30px rgba(0,0,0,.25),
  inset 0 1px 1px rgba(255,255,255,.04);
  transition:.3s;
}

.card:hover{
  transform:translateY(-2px);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-bottom:20px;
}

/* STAT */

.stat{
  padding:28px;
  border-radius:22px;
  position:relative;
  overflow:hidden;
  background:
  linear-gradient(135deg,
  rgba(59,130,246,.9),
  rgba(6,182,212,.8));
  box-shadow:
  0 15px 35px rgba(59,130,246,.25);
}

.stat::before{
  content:'';
  position:absolute;
  width:120px;
  height:120px;
  background:rgba(255,255,255,.08);
  border-radius:50%;
  top:-30px;
  right:-30px;
}

.stat h2{
  font-size:32px;
  margin-bottom:10px;
  font-weight:700;
}

.stat p{
  opacity:.9;
  font-size:15px;
}

/* INPUT */

input,
select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  outline:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:white;
  font-size:14px;
  border:1px solid transparent;
  transition:.3s;
}

input:focus,
select:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

/* BUTTON */

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:14px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  color:white;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  transition:.3s;
  box-shadow:0 10px 20px rgba(37,99,235,.25);
}

button:hover{
  transform:translateY(-2px);
  opacity:.95;
}

button:active{
  transform:scale(.98);
}

/* TABLE */

.table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:16px;
}

.table thead{
  background:rgba(255,255,255,.05);
}

.table th{
  text-align:left;
  padding:16px;
  font-size:14px;
  font-weight:600;
  color:#94a3b8;
}

.table td{
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:14px;
}

.table tr{
  transition:.2s;
}

.table tbody tr:hover{
  background:rgba(255,255,255,.03);
}

/* LOGIN */

#loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

#loginPage .card{
  width:100%;
  max-width:420px;
}

/* USER INFO */

#userInfo{
  margin-bottom:20px;
  padding:14px 18px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  display:inline-block;
  font-size:14px;
}

/* SMALL */

.small{
  font-size:13px;
  margin-top:10px;
  opacity:.7;
}

/* CHART */

canvas{
  margin-top:20px;
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:#334155;
  border-radius:20px;
}

/* MOBILE */

@media(max-width:900px){

  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
    display:flex;
    gap:10px;
    overflow:auto;
  }

  .sidebar h3{
    display:none;
  }

  .menu{
    white-space:nowrap;
    margin:0;
  }

  .main{
    padding:20px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .table{
    font-size:12px;
  }

}

.hidden{
  display:none;
}

</style>
</head>

<body>

<div id="loginPage" class="main">
  <div class="card">
    <h2 style="margin-bottom:20px;">Sales Pro Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="sidebar">

  <h3>Sales Pro</h3>

  <div class="menu active" onclick="show('dashboard')">
    📊 Dashboard
  </div>

  <div class="menu" onclick="show('input')">
    ➕ Input
  </div>

  <div class="menu" onclick="show('laporan')">
    📑 Laporan
  </div>

  <div class="menu" onclick="logout()">
    🚪 Logout
  </div>

</div>

<div class="main">

<div id="userInfo"></div>

<div id="dashboard">

  <div class="card">

    <input type="date" id="start" onchange="render()">
    <input type="date" id="end" onchange="render()">

    <select id="filterCabang" onchange="render()"></select>

  </div>

  <div class="grid">

    <div class="stat">
      <h2 id="total">Rp 0</h2>
      <p>Total Omset</p>
    </div>

    <div class="stat">
      <h2 id="trx">0</h2>
      <p>Total Transaksi</p>
    </div>

    <div class="stat">
      <h2 id="avg">Rp 0</h2>
      <p>Rata-rata Omset</p>
    </div>

  </div>

  <div class="grid">

    <div class="card">
      <h3>📈 Omset Harian</h3>
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <h3>👤 Per Sales</h3>
      <canvas id="chartSales"></canvas>
    </div>

  </div>

</div>

<div id="input" class="hidden">

  <div class="card">

    <h3 style="margin-bottom:15px;">Input Data Sales</h3>

    <input id="toko" placeholder="Nama Toko">

    <input type="date" id="tanggal">

    <input id="omset" type="number" placeholder="Nominal Omset">

    <div class="small">
      Sales:
      <b id="infoCabang"></b>
    </div>

    <button onclick="simpan()">Simpan Data</button>

  </div>

  <div class="card" id="boxCabang" style="display:none">

    <h3>Tambah Sales</h3>

    <input id="newCabang" placeholder="Nama Sales">

    <button onclick="tambahCabang()">
      Tambah Sales
    </button>

  </div>

</div>

<div id="laporan" class="hidden">

  <div class="card">

    <table class="table">

      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Sales</th>
          <th>Omset</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody id="table"></tbody>

    </table>

  </div>

</div>

</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let data=[],
role="staff",
userCabang="",
cabangList=[],
chartInstance,
chartSalesInstance;

// NORMALISASI

function fixCabang(n){

  if(!n) return "Sales 1";

  if(n.includes("Sales")) return n;

  const map={
    "Cabang A":"Sales 1",
    "Cabang B":"Sales 2"
  };

  return map[n]||"Sales 1";
}

window.onload=()=>{

  tanggal.value=
  new Date().toISOString().split("T")[0];

};

// AUTH

auth.onAuthStateChanged(async user=>{

  if(user){

    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    let doc=
    await db.collection("users")
    .doc(user.uid).get();

    role=doc.data().role;
    userCabang=doc.data().cabang;

    userInfo.innerText=
    user.email+" ("+role+")";

    infoCabang.innerText=userCabang;

    boxCabang.style.display=
    (role==="admin")
    ?"block":"none";

    render();

  }else{

    loginPage.classList.remove("hidden");
    app.classList.add("hidden");

  }

});

// LOGIN

async function login(){

  await auth.signInWithEmailAndPassword(
    email.value,
    password.value
  );

}

// REGISTER

async function register(){

  let user=
  await auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  );

  let isAdmin=
  email.value.includes("admin");

  await db.collection("users")
  .doc(user.user.uid)
  .set({

    role:isAdmin?"admin":"staff",

    cabang:isAdmin
    ?"ALL"
    :"Sales 1"

  });

}

function logout(){

  auth.signOut();

}

// NAV

function show(id){

  ["dashboard","input","laporan"]
  .forEach(x=>
    document.getElementById(x)
    .classList.add("hidden")
  );

  document.getElementById(id)
  .classList.remove("hidden");

}

// ACTIVE MENU

document.querySelectorAll('.menu')
.forEach(menu=>{

  menu.addEventListener('click',()=>{

    document.querySelectorAll('.menu')
    .forEach(m=>m.classList.remove('active'));

    menu.classList.add('active');

  });

});

// CABANG

db.collection("cabang")
.onSnapshot(snap=>{

  cabangList=
  snap.docs.map(d=>d.data().nama);

  if(role==="admin"){

    filterCabang.innerHTML=
    '<option value="">Semua</option>'+
    cabangList.map(c=>
    `<option>${c}</option>`).join("");

  }else{

    filterCabang.innerHTML=
    `<option>${userCabang}</option>`;

    filterCabang.disabled=true;

  }

});

// DATA

db.collection("sales")
.onSnapshot(snap=>{

  data=snap.docs.map(d=>({
    ...d.data(),
    id:d.id
  }));

  render();

});

// SIMPAN

async function simpan(){

  await db.collection("sales").add({

    toko:toko.value,

    tanggal:tanggal.value,

    omset:Number(omset.value),

    cabang:fixCabang(
      role==="admin"
      ? (filterCabang.value||cabangList[0])
      : userCabang
    )

  });

  toko.value="";
  omset.value="";

}

// RENDER

function render(){

  let cab=filterCabang.value;

  let f=data.map(d=>{

    d.cabang=fixCabang(d.cabang);

    return d;

  }).filter(d=>{

    if(role!=="admin" &&
    d.cabang!==userCabang)
    return false;

    if(role==="admin" &&
    cab &&
    d.cabang!==cab)
    return false;

    return true;

  });

  let totalVal=
  f.reduce((a,b)=>a+(b.omset||0),0);

  total.innerText=rp(totalVal);

  trx.innerText=f.length;

  avg.innerText=
  rp(f.length?totalVal/f.length:0);

  let perHari={};

  f.forEach(d=>

    perHari[d.tanggal]=
    (perHari[d.tanggal]||0)+d.omset

  );

  if(chartInstance)
  chartInstance.destroy();

  chartInstance=new Chart(chart,{

    type:'line',

    data:{
      labels:Object.keys(perHari),
      datasets:[{
        data:Object.values(perHari),
        borderWidth:3,
        tension:.4
      }]
    }

  });

  let perSales={};

  f.forEach(d=>

    perSales[d.cabang]=
    (perSales[d.cabang]||0)+d.omset

  );

  if(chartSalesInstance)
  chartSalesInstance.destroy();

  chartSalesInstance=new Chart(chartSales,{

    type:'bar',

    data:{
      labels:Object.keys(perSales),
      datasets:[{
        data:Object.values(perSales),
        borderRadius:10
      }]
    }

  });

  table.innerHTML=f.map(d=>`

    <tr>

      <td>${d.tanggal}</td>

      <td>${d.toko}</td>

      <td>${d.cabang}</td>

      <td>${rp(d.omset)}</td>

      <td>

      ${role==="admin"

      ?`<button onclick="del('${d.id}')">
      Hapus
      </button>`

      :"-"}

      </td>

    </tr>

  `).join("");

}

function rp(a){

  return "Rp "+
  Number(a||0)
  .toLocaleString("id-ID");

}

// DELETE

async function del(id){

  if(role!=="admin") return;

  await db.collection("sales")
  .doc(id)
  .delete();

}

</script>

</body>
</html>
