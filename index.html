<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Level 4</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;background:#020617;color:#e2e8f0;font-family:sans-serif;display:flex;}
.sidebar{width:220px;background:#0f172a;padding:20px;}
.menu{padding:10px;cursor:pointer;border-radius:6px;}
.menu:hover{background:#3b82f6;}
.main{flex:1;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px;}
input,select,button{width:100%;padding:10px;margin-top:5px;}
button{background:#3b82f6;color:white;border:none;}
.stats{display:flex;gap:10px;}
.stat{flex:1;text-align:center;}
table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #333;}
.topbar{display:flex;justify-content:space-between;margin-bottom:10px;}
</style>
</head>

<body>

<div class="sidebar">
  <h3>📊 Sales Biz</h3>
  <div class="menu" onclick="show('input')">Input</div>
  <div class="menu" onclick="show('dashboard')">Dashboard</div>
  <div class="menu" onclick="show('laporan')">Laporan</div>
</div>

<div class="main">

<div class="topbar">
  <div id="userInfo">Belum login</div>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="fixCabang()">Fix Data Lama</button>
  </div>
</div>

<!-- INPUT -->
<div id="input">
  <div class="card">
    <input id="toko" placeholder="Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">
    <select id="cabang">
      <option>Cabang A</option>
      <option>Cabang B</option>
    </select>
    <button onclick="simpan()">Simpan</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="stats">
    <div class="card stat"><p>Total</p><h3 id="totalAll">Rp 0</h3></div>
    <div class="card stat"><p>Transaksi</p><h3 id="trx">0</h3></div>
    <div class="card stat"><p>Top Toko</p><h3 id="top">-</h3></div>
  </div>

  <div class="card">
    <select id="filterCabang" onchange="render()">
      <option value="">Semua Cabang</option>
      <option>Cabang A</option>
      <option>Cabang B</option>
    </select>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- LAPORAN -->
<div id="laporan" style="display:none">
  <div class="card">
    <button onclick="exportPDF()">Export PDF</button>
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Cabang</th>
          <th>Omset</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let role="staff";
let data=[];
let chartInstance;

// AUTO TANGGAL
document.getElementById("tanggal").value=new Date().toISOString().split("T")[0];

// LOGIN
async function login(){
  let email=prompt("Email");
  let pass=prompt("Password");
  await auth.signInWithEmailAndPassword(email,pass);
}

// LOGOUT
function logout(){auth.signOut();}

// ROLE
auth.onAuthStateChanged(async user=>{
  if(user){
    let doc=await db.collection("users").doc(user.uid).get();
    role=doc.exists?doc.data().role:"staff";
    userInfo.innerText=user.email+" ("+role+")";
  }else{
    userInfo.innerText="Belum login";
  }
  render();
});

// NAV
function show(id){
  input.style.display="none";
  dashboard.style.display="none";
  laporan.style.display="none";
  document.getElementById(id).style.display="block";
}

// FORMAT
function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

// LOAD
db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

// SIMPAN
async function simpan(){
  let tokoVal=document.getElementById("toko").value;
  let tanggalVal=document.getElementById("tanggal").value;
  let omsetVal=Number(document.getElementById("omset").value);
  let cabangVal=document.getElementById("cabang").value;

  if(!tokoVal || !tanggalVal || !omsetVal){
    return alert("Lengkapi data");
  }

  await db.collection("sales").add({
    toko:tokoVal,
    tanggal:tanggalVal,
    omset:omsetVal,
    cabang:cabangVal || "Cabang A"
  });

  document.getElementById("toko").value="";
  document.getElementById("omset").value="";
}

// DELETE
async function del(id){
  if(role!=="admin") return alert("Admin only");
  await db.collection("sales").doc(id).delete();
}

// FIX DATA LAMA
async function fixCabang(){
  let snap=await db.collection("sales").get();

  snap.forEach(async doc=>{
    let d=doc.data();
    if(!d.cabang){
      await db.collection("sales").doc(doc.id).update({
        cabang:"Cabang A"
      });
    }
  });

  alert("Data lama sudah diperbaiki ke Cabang A ✅");
}

// RENDER
function render(){
  let cab=document.getElementById("filterCabang").value;

  let f=data.filter(d=>!cab || d.cabang===cab);

  document.getElementById("table").innerHTML=f.map(d=>`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${d.cabang || "Cabang A"}</td>
      <td>${rp(d.omset)}</td>
      <td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
    </tr>
  `).join("");

  let total=f.reduce((a,b)=>a+b.omset,0);
  document.getElementById("totalAll").innerText=rp(total);
  document.getElementById("trx").innerText=f.length;

  let perToko={};
  f.forEach(d=>{
    let toko=d.toko || "Unknown";
    perToko[toko]=(perToko[toko]||0)+d.omset;
  });

  let topToko=Object.entries(perToko).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("top").innerText=topToko?topToko[0]:"-";

  if(chartInstance) chartInstance.destroy();

  chartInstance=new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:Object.keys(perToko),
      datasets:[{
        label:"Omset",
        data:Object.values(perToko)
      }]
    }
  });
}

// PDF
function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  let y=10;
  data.forEach(d=>{
    doc.text(`${d.tanggal} | ${d.toko} | ${d.cabang || "Cabang A"} | ${d.omset}`,10,y);
    y+=10;
  });

  doc.save("laporan.pdf");
}
</script>

</body>
</html>
