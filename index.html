<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(30,41,59,0.7);
  --primary:#3b82f6;
  --accent:#22c55e;
  --text:#e2e8f0;
}

*{transition:all .2s ease;}

body{
  margin:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:rgba(2,6,23,0.8);
  backdrop-filter:blur(10px);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid rgba(255,255,255,0.05);
}

.menu{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:10px;
  margin-bottom:6px;
  cursor:pointer;
}
.menu:hover{background:var(--primary);}
.menu.active{background:var(--primary);}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  max-width:1200px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.double{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.full{grid-column:1 / -1;}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* INPUT */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:none;
}
input,select{
  background:#020617;
  color:white;
  border:1px solid #334155;
}
button{
  background:var(--primary);
  color:white;
  cursor:pointer;
}
button:hover{opacity:0.9}

/* STAT */
.stat{
  text-align:center;
  padding:25px;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
}

/* LOGIN */
.login-box{
  max-width:300px;
  margin:100px auto;
}

.hidden{display:none;}

.table{
  width:100%;
  border-collapse:collapse;
}
.table th,.table td{
  padding:10px;
  border-bottom:1px solid #334155;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

@media(max-width:768px){
  .sidebar{display:none;}
  .double{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginPage" class="main">
  <div class="card login-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <div>
    <h3>📊 Sales Pro</h3>
    <div class="menu active" onclick="show('dashboard',this)">🏠 Dashboard</div>
    <div class="menu" onclick="show('input',this)">➕ Input</div>
    <div class="menu" onclick="show('laporan',this)">📄 Laporan</div>
  </div>
  <div>
    <div class="menu" onclick="logout()">🚪 Logout</div>
  </div>
</div>

<div class="main">

<div id="userInfo"></div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="card">
<h3>Filter</h3>
<input type="date" id="start" onchange="render()">
<input type="date" id="end" onchange="render()">
<select id="filterCabang" onchange="render()">
<option value="">Semua Cabang</option>
<option>Cabang A</option>
<option>Cabang B</option>
</select>
</div>

<div class="grid">
<div class="stat"><h2 id="total">Rp 0</h2><p>Total Omset</p></div>
<div class="stat"><h2 id="trx">0</h2><p>Transaksi</p></div>
<div class="stat"><h2 id="avg">Rp 0</h2><p>Avg</p></div>
</div>

<div class="card full">
<h3>📊 Grafik Omset</h3>
<canvas id="chart" height="120"></canvas>
</div>

<div class="double">
<div class="card"><h3>🏆 Top Toko</h3><div id="topToko"></div></div>
<div class="card"><h3>📌 Insight</h3><div id="insight"></div></div>
</div>

</div>

<!-- INPUT -->
<div id="input" class="hidden">
<div class="card">
<input id="toko" placeholder="Toko">
<input type="date" id="tanggal">
<input id="omset" type="number" placeholder="Omset">
<select id="cabang">
<option>Cabang A</option>
<option>Cabang B</option>
</select>
<button id="btnSimpan" onclick="simpan()" disabled>Simpan</button>
</div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="hidden">
<div class="card">
<table class="table">
<thead>
<tr>
<th>Tanggal</th><th>Toko</th><th>Cabang</th><th>Omset</th><th>Aksi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let role="staff",data=[],isLogin=false,chartInstance;

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

window.onload=()=>{
  tanggal.value=new Date().toISOString().split("T")[0];
};

async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
  toast("Login berhasil");
}

async function register(){
  let user=await auth.createUserWithEmailAndPassword(email.value,password.value);
  let r=email.value.includes("admin")?"admin":"staff";
  await db.collection("users").doc(user.user.uid).set({role:r});
  toast("Akun dibuat: "+r);
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(async user=>{
  if(user){
    isLogin=true;
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    let doc=await db.collection("users").doc(user.uid).get();
    role=doc.exists?doc.data().role:"staff";

    userInfo.innerText=user.email+" ("+role+")";
    btnSimpan.disabled=false;
  }else{
    loginPage.classList.remove("hidden");
    app.classList.add("hidden");
  }
});

function show(id,el){
  ["dashboard","input","laporan"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));
  if(el) el.classList.add("active");
}

async function simpan(){
  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    cabang:cabang.value
  });
  toast("Data tersimpan");
}

async function del(id){
  if(role!=="admin") return toast("Admin only");
  await db.collection("sales").doc(id).delete();
  toast("Data dihapus");
}

db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

function render(){
let f=data;

let totalVal=f.reduce((a,b)=>a+(b.omset||0),0);
let trxVal=f.length;
let avgVal=trxVal?Math.round(totalVal/trxVal):0;

total.innerText=rp(totalVal);
trx.innerText=trxVal;
avg.innerText=rp(avgVal);

let perHari={};
f.forEach(d=>perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset);

if(chartInstance) chartInstance.destroy();
chartInstance=new Chart(chart,{
type:'line',
data:{labels:Object.keys(perHari),datasets:[{data:Object.values(perHari)}]}
});

table.innerHTML=f.map(d=>`
<tr>
<td>${d.tanggal}</td>
<td>${d.toko}</td>
<td>${d.cabang}</td>
<td>${rp(d.omset)}</td>
<td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
</tr>`).join("");
}
</script>

</body>
</html>
