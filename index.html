<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  font-family:'Inter',sans-serif;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:20px;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  max-width:1200px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

/* MENU */
.menu{padding:12px;border-radius:10px;cursor:pointer;}
.menu:hover,.active{background:#3b82f6;}

/* INPUT */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}
button{background:#3b82f6;color:white;}

.hidden{display:none;}
.table{width:100%;}
.small{font-size:12px;opacity:.7}

/* STAT */
.stat{
  text-align:center;
  padding:20px;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="main">
  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <h3>Sales Pro</h3>
  <div class="menu active" onclick="show('dashboard',this)">Dashboard</div>
  <div class="menu" onclick="show('input',this)">Input</div>
  <div class="menu" onclick="show('laporan',this)">Laporan</div>
  <div class="menu" onclick="logout()">Logout</div>
</div>

<div class="main">

<div id="userInfo"></div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- FILTER -->
  <div class="card">
    <input type="date" id="start" onchange="render()">
    <input type="date" id="end" onchange="render()">
    <select id="filterCabang" onchange="render()"></select>
  </div>

  <!-- STATS -->
  <div class="grid">
    <div class="stat">
      <h2 id="total">Rp 0</h2>
      <p>Total Omset</p>
    </div>
    <div class="stat">
      <h2 id="trx">0</h2>
      <p>Transaksi</p>
    </div>
    <div class="stat">
      <h2 id="avg">Rp 0</h2>
      <p>Rata-rata</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="grid">
    <div class="card">
      <h3>📈 Omset Harian</h3>
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <h3>👤 Per Sales</h3>
      <canvas id="chartSales"></canvas>
    </div>
  </div>

</div>

<!-- INPUT -->
<div id="input" class="hidden">
  <div class="card">
    <input id="toko" placeholder="Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">

    <div class="small">Cabang: <b id="infoCabang"></b></div>

    <button onclick="simpan()">Simpan</button>
  </div>

  <!-- ADMIN -->
  <div class="card" id="boxCabang" style="display:none">
    <h3>Tambah Cabang</h3>
    <input id="newCabang">
    <button onclick="tambahCabang()">Tambah</button>
  </div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="hidden">
  <div class="card">
    <table class="table">
      <thead>
        <tr>
          <th>Tanggal</th><th>Toko</th><th>Cabang</th><th>Omset</th><th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let data=[],role="staff",userCabang="",cabangList=[],chartInstance,chartSalesInstance;

// DEFAULT TANGGAL
window.onload=()=>{
  tanggal.value=new Date().toISOString().split("T")[0];
};

// LOGIN
async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

// REGISTER
async function register(){
  let user=await auth.createUserWithEmailAndPassword(email.value,password.value);
  let isAdmin=email.value.includes("admin");

  await db.collection("users").doc(user.user.uid).set({
    role:isAdmin?"admin":"staff",
    cabang:isAdmin?"ALL":"Sales 1"
  });
}

// AUTH
auth.onAuthStateChanged(async user=>{
  if(user){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    let doc=await db.collection("users").doc(user.uid).get();
    role=doc.data().role;
    userCabang=doc.data().cabang;

    userInfo.innerText=user.email+" ("+role+")";
    infoCabang.innerText=userCabang;

    boxCabang.style.display = (role==="admin")?"block":"none";

    let cek=await db.collection("cabang").get();
    if(cek.empty){
      await db.collection("cabang").add({nama:"Sales 1"});
      await db.collection("cabang").add({nama:"Sales 2"});
    }

  }else{
    loginPage.classList.remove("hidden");
    app.classList.add("hidden");
  }
});

function logout(){auth.signOut();}

// NAV
function show(id,el){
  ["dashboard","input","laporan"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// CABANG
db.collection("cabang").onSnapshot(snap=>{
  cabangList=snap.docs.map(d=>d.data().nama);

  if(role==="admin"){
    filterCabang.innerHTML='<option value="">Semua</option>'+
      cabangList.map(c=>`<option>${c}</option>`).join("");
  }else{
    filterCabang.innerHTML=`<option>${userCabang}</option>`;
    filterCabang.disabled=true;
  }
});

async function tambahCabang(){
  await db.collection("cabang").add({nama:newCabang.value});
  newCabang.value="";
}

// DATA
db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

// SIMPAN
async function simpan(){
  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    cabang: role==="admin"
      ? (filterCabang.value || cabangList[0])
      : userCabang
  });
}

// FORMAT
function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

// RENDER
function render(){

  let f=data.map(d=>{
    if(d.cabang==="Cabang A") d.cabang="Sales 1";
    if(d.cabang==="Cabang B") d.cabang="Sales 2";
    return d;
  }).filter(d=>{
    if(role!=="admin" && d.cabang!==userCabang) return false;
    if(filterCabang.value && role==="admin" && d.cabang!==filterCabang.value) return false;
    return true;
  });

  let totalVal=f.reduce((a,b)=>a+(b.omset||0),0);
  total.innerText=rp(totalVal);
  trx.innerText=f.length;
  avg.innerText=rp(f.length?totalVal/f.length:0);

  // CHART HARIAN
  let perHari={};
  f.forEach(d=>perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset);

  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(chart,{
    type:'line',
    data:{labels:Object.keys(perHari),datasets:[{data:Object.values(perHari)}]}
  });

  // CHART SALES
  let perSales={};
  f.forEach(d=>perSales[d.cabang]=(perSales[d.cabang]||0)+d.omset);

  if(chartSalesInstance) chartSalesInstance.destroy();
  chartSalesInstance=new Chart(chartSales,{
    type:'bar',
    data:{labels:Object.keys(perSales),datasets:[{data:Object.values(perSales)}]}
  });

  // TABLE
  table.innerHTML=f.map(d=>`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${d.cabang}</td>
      <td>${rp(d.omset)}</td>
      <td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
    </tr>
  `).join("");
}

// DELETE
async function del(id){
  if(role!=="admin") return;
  await db.collection("sales").doc(id).delete();
}
</script>

</body>
</html>
