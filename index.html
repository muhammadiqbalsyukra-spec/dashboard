<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  font-family:sans-serif;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.menu{
  padding:12px;
  border-radius:8px;
  margin-bottom:5px;
  cursor:pointer;
}
.menu:hover{background:#3b82f6;}

/* MAIN CENTER */
.main{
  flex:1;
  padding:30px;
  max-width:1200px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.double{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.full{
  grid-column:1 / -1;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#1e293b,#0f172a);
  padding:20px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* INPUT */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}
input,select{
  background:#020617;
  color:white;
  border:1px solid #334155;
}
button{background:#3b82f6;color:white;}
button:disabled{background:#555;}

/* STAT */
.stat{
  text-align:center;
  padding:25px;
  border-radius:16px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
}

/* LOGIN */
.login-box{
  max-width:300px;
  margin:100px auto;
}

.hidden{display:none;}

@media(max-width:768px){
  .double{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="main">
  <div class="card login-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <div>
    <h3>📊 Sales Pro</h3>
    <div class="menu" onclick="show('dashboard')">Dashboard</div>
    <div class="menu" onclick="show('input')">Input</div>
    <div class="menu" onclick="show('laporan')">Laporan</div>
  </div>
  <div>
    <div class="menu" onclick="logout()">Logout</div>
  </div>
</div>

<div class="main">

<div id="userInfo"></div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="card">
    <h3>Filter</h3>
    <input type="date" id="start" onchange="render()">
    <input type="date" id="end" onchange="render()">
    <select id="filterCabang" onchange="render()">
      <option value="">Semua Cabang</option>
      <option>Cabang A</option>
      <option>Cabang B</option>
    </select>
  </div>

  <!-- STATS -->
  <div class="grid">
    <div class="stat">
      <h2 id="total">Rp 0</h2>
      <p>Total Omset</p>
    </div>
    <div class="stat">
      <h2 id="trx">0</h2>
      <p>Transaksi</p>
    </div>
    <div class="stat">
      <h2 id="avg">Rp 0</h2>
      <p>Avg</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="card full">
    <h3>📊 Grafik Omset</h3>
    <canvas id="chart" height="120"></canvas>
  </div>

  <!-- BOTTOM -->
  <div class="double">

    <div class="card">
      <h3>🏆 Top Toko</h3>
      <div id="topToko"></div>
    </div>

    <div class="card">
      <h3>📌 Insight</h3>
      <div id="insight"></div>
    </div>

  </div>

</div>

<!-- INPUT -->
<div id="input" class="hidden">
  <div class="card">
    <input id="toko" placeholder="Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">
    <select id="cabang">
      <option>Cabang A</option>
      <option>Cabang B</option>
    </select>
    <button id="btnSimpan" onclick="simpan()" disabled>Simpan</button>
  </div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="hidden">
  <div class="card">
    <table width="100%">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Cabang</th>
          <th>Omset</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let role="staff";
let data=[];
let isLogin=false;
let chartInstance;

window.onload=()=>{
  document.getElementById("tanggal").value=
    new Date().toISOString().split("T")[0];
};

async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

async function register(){
  let user=await auth.createUserWithEmailAndPassword(email.value,password.value);
  let r=email.value.includes("admin")?"admin":"staff";
  await db.collection("users").doc(user.user.uid).set({role:r});
  alert("Akun dibuat: "+r);
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(async user=>{
  if(user){
    isLogin=true;
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    let doc=await db.collection("users").doc(user.uid).get();
    role=doc.exists?doc.data().role:"staff";

    userInfo.innerText=user.email+" ("+role+")";
    btnSimpan.disabled=false;
  }else{
    loginPage.classList.remove("hidden");
    app.classList.add("hidden");
  }
});

function show(id){
  dashboard.classList.add("hidden");
  input.classList.add("hidden");
  laporan.classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

async function simpan(){
  if(!isLogin) return alert("Login dulu");

  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    cabang:cabang.value || "Cabang A"
  });

  toko.value="";
  omset.value="";
}

async function del(id){
  if(role!=="admin") return alert("Admin only");
  await db.collection("sales").doc(id).delete();
}

db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

function render(){

  let s=start.value;
  let e=end.value;
  let cab=filterCabang.value;

  let f=data.filter(d=>{
    if(s && d.tanggal < s) return false;
    if(e && d.tanggal > e) return false;
    if(cab && d.cabang !== cab) return false;
    return true;
  });

  let totalVal=f.reduce((a,b)=>a+(b.omset||0),0);
  let trxVal=f.length;
  let avgVal=trxVal?Math.round(totalVal/trxVal):0;

  total.innerText=rp(totalVal);
  trx.innerText=trxVal;
  avg.innerText=rp(avgVal);

  let perToko={};
  f.forEach(d=>{
    perToko[d.toko]=(perToko[d.toko]||0)+d.omset;
  });

  let sorted=Object.entries(perToko).sort((a,b)=>b[1]-a[1]);

  topToko.innerHTML=sorted.slice(0,3)
    .map(x=>`${x[0]} (${rp(x[1])})`).join("<br>");

  insight.innerHTML = sorted.length ? `
    🔥 Terbaik: ${sorted[0][0]}<br>
    ⚠️ Terlemah: ${sorted[sorted.length-1][0]}
  ` : "Belum ada data";

  let perHari={};
  f.forEach(d=>{
    perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset;
  });

  let labels=Object.keys(perHari);
  let values=Object.values(perHari);

  if(chartInstance) chartInstance.destroy();

  chartInstance=new Chart(chart,{
    type:'line',
    data:{
      labels: labels.length?labels:["Tidak ada data"],
      datasets:[{
        label:"Omset",
        data: values.length?values:[0],
        borderWidth:3,
        tension:0.4,
        fill:true
      }]
    }
  });

  table.innerHTML=f.map(d=>`
  <tr>
    <td>${d.tanggal}</td>
    <td>${d.toko}</td>
    <td>${d.cabang||"Cabang A"}</td>
    <td>${rp(d.omset)}</td>
    <td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
  </tr>
  `).join("");
}
</script>

</body>
</html>
