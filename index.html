<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Monitor PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f1f5f9;
  margin: 0;
}

header {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

input, button {
  padding: 10px;
  margin-top: 5px;
  width: 100%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #0f172a;
  color: white;
  border: none;
}

.stats {
  display: flex;
  gap: 10px;
}

.stat {
  flex: 1;
  background: linear-gradient(135deg,#0f172a,#334155);
  color: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.stat h3 {
  margin: 0;
  font-size: 24px;
}

.filter {
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<header>
  Sales Monitoring Harian
</header>

<div class="container">

  <div class="card">
    <h3>Input Penjualan</h3>
    <input type="text" id="toko" placeholder="Nama Toko">
    <input type="number" id="omset" placeholder="Omset (Rp)">
    <button onclick="simpan()">Simpan</button>
  </div>

  <div class="stats">
    <div class="stat">
      <h3 id="totalOmset">0</h3>
      <p>Omset Hari Ini</p>
    </div>
    <div class="stat">
      <h3 id="ec">0</h3>
      <p>EC Hari Ini</p>
    </div>
    <div class="stat">
      <h3 id="avg">0</h3>
      <p>Avg / Toko</p>
    </div>
  </div>

  <div class="card">
    <h3>Filter Tanggal</h3>
    <div class="filter">
      <input type="date" id="start">
      <input type="date" id="end">
    </div>
    <button onclick="render()">Terapkan</button>
  </div>

  <div class="card">
    <h3>Grafik Omset Harian</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>History</h3>
    <ul id="list"></ul>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sales")) || [];
let chart;

function simpan() {
  const toko = document.getElementById("toko").value;
  const omset = parseInt(document.getElementById("omset").value);

  if (!toko || !omset) return alert("Lengkapi data!");

  const tanggal = new Date().toISOString().split("T")[0];

  data.push({ toko, omset, tanggal });
  localStorage.setItem("sales", JSON.stringify(data));

  document.getElementById("toko").value = "";
  document.getElementById("omset").value = "";

  render();
}

function render() {
  const today = new Date().toISOString().split("T")[0];

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  let filtered = data;

  if (start && end) {
    filtered = data.filter(d => d.tanggal >= start && d.tanggal <= end);
  }

  // Hari ini
  let todayData = data.filter(d => d.tanggal === today);

  let total = todayData.reduce((a,b)=>a+b.omset,0);
  let ec = todayData.length;
  let avg = ec ? Math.round(total/ec) : 0;

  document.getElementById("totalOmset").innerText = total;
  document.getElementById("ec").innerText = ec;
  document.getElementById("avg").innerText = avg;

  // Grafik
  let perHari = {};
  filtered.forEach(d => {
    perHari[d.tanggal] = (perHari[d.tanggal] || 0) + d.omset;
  });

  let labels = Object.keys(perHari);
  let values = Object.values(perHari);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Omset Harian',
        data: values
      }]
    }
  });

  // History
  let list = "";
  filtered.slice().reverse().forEach(d => {
    list += `<li>${d.tanggal} - ${d.toko} - Rp ${d.omset}</li>`;
  });

  document.getElementById("list").innerHTML = list;
}

render();
</script>

</body>
</html>
