<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#fff;
}

.hidden{
  display:none!important;
}

button{
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
  transform:translateY(-1px);
}

input,
select,
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:14px;
}

input,
select{
  background:#1e293b;
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
}

button{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;
  font-weight:600;
}

.card{
  background:#111827;
  border-radius:22px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

#loginPage{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-box{
  width:100%;
  max-width:400px;
}

#app{
  display:none;
}

#app.show{
  display:flex;
}

.sidebar{
  width:240px;
  min-height:100vh;
  background:#111827;
  padding:20px;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:25px;
}

.menu{
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;
}

.menu:hover{
  background:rgba(255,255,255,.05);
}

.menu.active{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.main{
  flex:1;
  padding:24px;
}

.top-title{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.stat-card{
  padding:24px;
  border-radius:22px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.stat-card h2{
  font-size:28px;
  margin-bottom:8px;
}

.chart-box{
  height:320px;
}

.table-wrapper{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,
td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,.06);
}

th{
  background:#1e293b;
}

.action-btn{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#ef4444;
  color:white;
  width:auto;
}

.loading{
  margin-top:10px;
  font-size:13px;
  opacity:.8;
}

.success{
  color:#22c55e;
}

.error{
  color:#ef4444;
}

@media(max-width:900px){

  #app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    min-height:auto;
    display:flex;
    overflow:auto;
    gap:10px;
  }

  .logo{
    display:none;
  }

}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

  <div class="card login-box">

    <h1 style="margin-bottom:20px;">
      Sales Pro Dashboard
    </h1>

    <input id="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">
      Login
    </button>

    <button onclick="register()">
      Register
    </button>

  </div>

</div>

<!-- APP -->

<div id="app">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      SALES PRO
    </div>

    <div class="menu active" onclick="showPage('dashboard',this)">
      Dashboard
    </div>

    <div class="menu" onclick="showPage('inputPage',this)">
      Input Data
    </div>

    <div class="menu" onclick="showPage('laporanPage',this)">
      Laporan
    </div>

    <div class="menu" onclick="logout()">
      Logout
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="top-title">
      <h1>Dashboard Penjualan</h1>
    </div>

    <!-- DASHBOARD -->

    <div id="dashboard">

      <div class="grid">

        <div class="stat-card">
          <h2 id="totalOmset">Rp 0</h2>
          <p>Total Omset</p>
        </div>

        <div class="stat-card">
          <h2 id="totalTrx">0</h2>
          <p>Total Transaksi</p>
        </div>

      </div>

      <div class="card">

        <h3 style="margin-bottom:16px;">
          Grafik Omset
        </h3>

        <div class="chart-box">
          <canvas id="chartOmset"></canvas>
        </div>

      </div>

    </div>

    <!-- INPUT -->

    <div id="inputPage" class="hidden">

      <div class="card">

        <h2 style="margin-bottom:20px;">
          Input Penjualan
        </h2>

        <input id="toko" placeholder="Nama toko">

        <input id="tanggal" type="date">

        <input id="omset" type="number" placeholder="Nominal omset">

        <select id="salesSelect">
          <option value="Sales 1">Sales 1</option>
          <option value="Sales 2">Sales 2</option>
          <option value="Sales 3">Sales 3</option>
        </select>

        <input type="file" id="notaFile" accept="image/*">

        <button onclick="scanNota()">
          Scan Nota OCR
        </button>

        <div id="ocrStatus" class="loading"></div>

        <button onclick="saveData()">
          Simpan Data
        </button>

      </div>

    </div>

    <!-- LAPORAN -->

    <div id="laporanPage" class="hidden">

      <div class="card table-wrapper">

        <h2 style="margin-bottom:20px;">
          Laporan Penjualan
        </h2>

        <table>

          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Toko</th>
              <th>Sales</th>
              <th>Omset</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

// ======================
// FIREBASE
// ======================

const firebaseConfig = {

  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",

  authDomain: "gudang-app-pro.firebaseapp.com",

  projectId: "gudang-app-pro",

  storageBucket: "gudang-app-pro.firebasestorage.app",

  messagingSenderId: "795043382766",

  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let salesData = [];
let chartInstance;

// ======================
// INITIAL
// ======================

window.onload = ()=>{

  tanggal.value = new Date()
  .toISOString()
  .split('T')[0];

};

// ======================
// AUTH
// ======================

async function login(){

  try{

    await auth.signInWithEmailAndPassword(
      email.value,
      password.value
    );

  }catch(err){

    alert(err.message);

  }

}

async function register(){

  try{

    await auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    );

    alert('Register berhasil');

  }catch(err){

    alert(err.message);

  }

}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{

  if(user){

    loginPage.classList.add('hidden');
    app.classList.add('show');

    loadData();

  }else{

    loginPage.classList.remove('hidden');
    app.classList.remove('show');

  }

});

// ======================
// PAGE
// ======================

function showPage(id,el){

  ['dashboard','inputPage','laporanPage']
  .forEach(page=>{

    document
    .getElementById(page)
    .classList.add('hidden');

  });

  document
  .getElementById(id)
  .classList.remove('hidden');

  document
  .querySelectorAll('.menu')
  .forEach(m=>m.classList.remove('active'));

  if(el){
    el.classList.add('active');
  }

}

// ======================
// OCR
// ======================

async function scanNota(){

  const file = notaFile.files[0];

  if(!file){

    alert('Pilih foto nota');
    return;

  }

  ocrStatus.innerHTML =
  '🔍 Scanning OCR...';

  try{

    const result =
    await Tesseract.recognize(
      file,
      'eng'
    );

    const text = result.data.text;

    const nominal =
    extractNominal(text);

    if(nominal > 0){

      omset.value = nominal;

      ocrStatus.innerHTML =
      '<span class="success">✅ OCR berhasil membaca nominal</span>';

    }else{

      ocrStatus.innerHTML =
      '<span class="error">⚠️ Nominal tidak ditemukan</span>';

    }

  }catch(err){

    console.log(err);

    ocrStatus.innerHTML =
    '<span class="error">❌ OCR gagal</span>';

  }

}

function extractNominal(text){

  const numbers =
  text.match(/\d+[.,]?\d+/g);

  if(!numbers) return 0;

  let terbesar = 0;

  numbers.forEach(num=>{

    const val = Number(
      num.replace(/\./g,'')
      .replace(/,/g,'')
    );

    if(val > terbesar){

      terbesar = val;

    }

  });

  return terbesar;

}

// ======================
// DATABASE
// ======================

async function saveData(){

  if(
    !toko.value ||
    !tanggal.value ||
    !omset.value
  ){

    alert('Lengkapi data');
    return;

  }

  await db.collection('sales')
  .add({

    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    sales:salesSelect.value

  });

  toko.value = '';
  omset.value = '';
  notaFile.value = '';
  ocrStatus.innerHTML = '';

  alert('Data berhasil disimpan');

}

function loadData(){

  db.collection('sales')
  .orderBy('tanggal','desc')
  .onSnapshot(snap=>{

    salesData =
    snap.docs.map(doc=>({

      ...doc.data(),
      id:doc.id

    }));

    renderDashboard();
    renderTable();

  });

}

// ======================
// DASHBOARD
// ======================

function renderDashboard(){

  const total =
  salesData.reduce((a,b)=>
  a + b.omset,0);

  totalOmset.innerText =
  rp(total);

  totalTrx.innerText =
  salesData.length;

  renderChart();

}

function renderChart(){

  let perHari = {};

  salesData.forEach(item=>{

    perHari[item.tanggal] =
    (perHari[item.tanggal] || 0)
    + item.omset;

  });

  const labels =
  Object.keys(perHari);

  const values =
  Object.values(perHari);

  if(chartInstance){

    chartInstance.destroy();

  }

  chartInstance =
  new Chart(chartOmset,{

    type:'bar',

    data:{

      labels:labels,

      datasets:[{

        label:'Omset',

        data:values,

        borderRadius:12

      }]

    },

    options:{

      responsive:true,

      maintainAspectRatio:false,

      plugins:{
        legend:{
          display:false
        }
      },

      scales:{

        y:{

          ticks:{
            color:'#fff'
          },

          grid:{
            color:'rgba(255,255,255,.05)'
          }

        },

        x:{

          ticks:{
            color:'#fff'
          },

          grid:{
            display:false
          }

        }

      }

    }

  });

}

// ======================
// TABLE
// ======================

function renderTable(){

  tableBody.innerHTML =
  salesData.map(item=>`

    <tr>

      <td>${item.tanggal}</td>

      <td>${item.toko}</td>

      <td>${item.sales}</td>

      <td>${rp(item.omset)}</td>

      <td>

        <button
        class="action-btn"
        onclick="hapus('${item.id}')">

          Hapus

        </button>

      </td>

    </tr>

  `).join('');

}

// ======================
// DELETE
// ======================

async function hapus(id){

  const ok =
  confirm('Hapus data ini?');

  if(!ok) return;

  await db.collection('sales')
  .doc(id)
  .delete();

}

// ======================
// HELPER
// ======================

function rp(n){

  return 'Rp ' +
  Number(n || 0)
  .toLocaleString('id-ID');

}

</script>
</body>
</html>
