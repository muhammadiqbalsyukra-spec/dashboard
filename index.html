<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;background:#020617;color:white;font-family:sans-serif;display:flex;}
.sidebar{width:220px;background:#0f172a;padding:20px;display:flex;flex-direction:column;justify-content:space-between;}
.menu{padding:10px;border-radius:6px;cursor:pointer;}
.menu:hover{background:#3b82f6;}
.main{flex:1;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px;}
input,button,select{width:100%;padding:10px;margin-top:5px;}
button{background:#3b82f6;color:white;border:none;}
.hidden{display:none;}
.login-box{max-width:300px;margin:100px auto;}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginPage" class="main">
  <div class="card login-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <div>
    <h3>📊 Sales Pro</h3>
    <div class="menu" onclick="show('input')">Input</div>
    <div class="menu" onclick="show('laporan')">Laporan</div>
  </div>

  <div>
    <div class="menu" onclick="logout()">Logout</div>
  </div>
</div>

<div class="main">

<div id="userInfo"></div>

<!-- INPUT -->
<div id="input">
  <div class="card">
    <input id="toko" placeholder="Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">
    <select id="cabang">
      <option>Cabang A</option>
      <option>Cabang B</option>
    </select>
    <button id="btnSimpan" onclick="simpan()">Simpan</button>
  </div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="hidden">
  <div class="card">
    <table width="100%">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Cabang</th>
          <th>Omset</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let role="staff";
let data=[];

// LOGIN
async function login(){
  let e=email.value;
  let p=password.value;
  await auth.signInWithEmailAndPassword(e,p);
}

// REGISTER
async function register(){
  let e=email.value;
  let p=password.value;

  let user=await auth.createUserWithEmailAndPassword(e,p);

  // AUTO ROLE
  let r=e.includes("admin")?"admin":"staff";

  await db.collection("users").doc(user.user.uid).set({
    role:r
  });

  alert("Akun dibuat sebagai "+r);
}

// LOGOUT
function logout(){auth.signOut();}

// AUTH STATE
auth.onAuthStateChanged(async user=>{
  if(user){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    let doc=await db.collection("users").doc(user.uid).get();
    role=doc.data().role;

    userInfo.innerText=user.email+" ("+role+")";
  }else{
    loginPage.classList.remove("hidden");
    app.classList.add("hidden");
  }
});

// NAV
function show(id){
  input.classList.add("hidden");
  laporan.classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

// SIMPAN
async function simpan(){
  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    cabang:cabang.value
  });
}

// DELETE
async function del(id){
  if(role!=="admin") return alert("Admin only");
  await db.collection("sales").doc(id).delete();
}

// LOAD
db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

// RENDER
function render(){
  table.innerHTML=data.map(d=>`
  <tr>
    <td>${d.tanggal}</td>
    <td>${d.toko}</td>
    <td>${d.cabang}</td>
    <td>${d.omset}</td>
    <td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
  </tr>
  `).join("");
}
</script>

</body>
</html>
