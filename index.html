<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Max</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#020617;color:#e2e8f0;font-family:sans-serif;display:flex;}
.sidebar{width:220px;background:#0f172a;padding:20px;}
.menu{padding:10px;cursor:pointer;border-radius:6px;}
.menu:hover{background:#3b82f6;}
.main{flex:1;padding:20px;}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px;}
input,select,button{width:100%;padding:10px;margin-top:5px;}
button{background:#3b82f6;color:white;border:none;}
.stats{display:flex;gap:10px;}
.stat{flex:1;text-align:center;}
table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #333;}
.highlight{color:#22c55e;font-weight:bold;}
</style>
</head>

<body>

<div class="sidebar">
  <h3>📊 Sales Max</h3>
  <div class="menu" onclick="show('input')">Input</div>
  <div class="menu" onclick="show('dashboard')">Dashboard</div>
  <div class="menu" onclick="show('laporan')">Laporan</div>
</div>

<div class="main">

<!-- INPUT -->
<div id="input">
  <div class="card">
    <input id="toko" placeholder="Nama Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">
    <button onclick="simpan()">Simpan</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="stats">
    <div class="card stat">
      <p>Total Omset</p>
      <h3 id="totalAll">Rp 0</h3>
    </div>
    <div class="card stat">
      <p>Total Transaksi</p>
      <h3 id="totalTrx">0</h3>
    </div>
    <div class="card stat">
      <p>Top Toko</p>
      <h3 id="topToko">-</h3>
    </div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- LAPORAN -->
<div id="laporan" style="display:none">
  <div class="card">
    <input id="search" placeholder="Cari toko..." oninput="render()">
    <select id="filterToko" onchange="render()"></select>
    <button onclick="sortData()">Sort Omset</button>

    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Omset</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let data=[];
let chartInstance;
let asc=true;

tanggal.value=new Date().toISOString().split("T")[0];

function show(id){
  input.style.display="none";
  dashboard.style.display="none";
  laporan.style.display="none";
  document.getElementById(id).style.display="block";
}

function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

// LOAD REALTIME
db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  initFilter();
  render();
});

// SIMPAN
async function simpan(){
  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value)
  });
}

// FILTER TOKO
function initFilter(){
  let tokoSet=[...new Set(data.map(d=>d.toko))];
  filterToko.innerHTML='<option value="">Semua Toko</option>';
  tokoSet.forEach(t=>{
    filterToko.innerHTML+=`<option>${t}</option>`;
  });
}

// SORT
function sortData(){
  asc=!asc;
  data.sort((a,b)=>asc?a.omset-b.omset:b.omset-a.omset);
  render();
}

// RENDER
function render(){
  let keyword=search.value.toLowerCase();
  let ft=filterToko.value;

  let filtered=data.filter(d=>{
    return (!ft||d.toko===ft) &&
           d.toko.toLowerCase().includes(keyword);
  });

  // TABLE
  table.innerHTML=filtered.map(d=>`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${rp(d.omset)}</td>
    </tr>
  `).join("");

  // SUMMARY
  let total=filtered.reduce((a,b)=>a+b.omset,0);
  totalAll.innerText=rp(total);
  totalTrx.innerText=filtered.length;

  let perToko={};
  filtered.forEach(d=>{
    perToko[d.toko]=(perToko[d.toko]||0)+d.omset;
  });

  let top=Object.entries(perToko).sort((a,b)=>b[1]-a[1])[0];
  topToko.innerText=top?top[0]:"-";

  // CHART
  let labels=Object.keys(perToko);
  let values=Object.values(perToko);

  if(chartInstance) chartInstance.destroy();

  chartInstance=new Chart(chart,{
    type:'bar',
    data:{
      labels,
      datasets:[{data:values}]
    }
  });
}
</script>

</body>
</html>
