<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Monitor PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

/* Glass effect */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.container {
  padding: 15px;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  outline: none;
}

input {
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.stats {
  display: flex;
  gap: 10px;
}

.stat {
  flex: 1;
  text-align: center;
}

.stat h3 {
  margin: 5px 0;
}

.filter {
  display: flex;
  gap: 10px;
}

ul {
  padding-left: 15px;
}
</style>
</head>

<body>

<header>📊 Sales Monitoring</header>

<div class="container">

  <div class="card">
    <h3>Input Penjualan</h3>
    <input type="text" id="toko" placeholder="Nama Toko">
    <input type="number" id="omset" placeholder="Omset (angka saja)">
    <button onclick="simpan()">Simpan</button>
  </div>

  <div class="card stats">
    <div class="stat">
      <p>Omset Hari Ini</p>
      <h3 id="totalOmset">Rp 0</h3>
    </div>
    <div class="stat">
      <p>EC Hari Ini</p>
      <h3 id="ec">0</h3>
    </div>
    <div class="stat">
      <p>Avg / Toko</p>
      <h3 id="avg">Rp 0</h3>
    </div>
  </div>

  <div class="card">
    <h3>Filter</h3>
    <div class="filter">
      <input type="date" id="start">
      <input type="date" id="end">
    </div>
    <button onclick="render()">Terapkan</button>
  </div>

  <div class="card">
    <h3>Grafik Omset Harian</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>History</h3>
    <ul id="list"></ul>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sales")) || [];
let chart;

// Format Rupiah
function formatRupiah(angka) {
  return "Rp " + angka.toLocaleString("id-ID");
}

function simpan() {
  const toko = document.getElementById("toko").value.trim();
  const omset = parseInt(document.getElementById("omset").value);

  if (!toko || isNaN(omset) || omset <= 0) {
    alert("Isi data dengan benar!");
    return;
  }

  const tanggal = new Date().toISOString().split("T")[0];

  data.push({ toko, omset, tanggal });
  localStorage.setItem("sales", JSON.stringify(data));

  document.getElementById("toko").value = "";
  document.getElementById("omset").value = "";

  render();
}

function render() {
  const today = new Date().toISOString().split("T")[0];

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  let filtered = [...data];

  if (start && end) {
    filtered = filtered.filter(d => d.tanggal >= start && d.tanggal <= end);
  }

  // SORT tanggal biar grafik rapi
  filtered.sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal));

  // Data hari ini
  let todayData = data.filter(d => d.tanggal === today);

  let total = todayData.reduce((a,b)=>a+b.omset,0);
  let ec = todayData.length;
  let avg = ec ? Math.round(total/ec) : 0;

  document.getElementById("totalOmset").innerText = formatRupiah(total);
  document.getElementById("ec").innerText = ec;
  document.getElementById("avg").innerText = formatRupiah(avg);

  // Grafik
  let perHari = {};

  filtered.forEach(d => {
    if (!perHari[d.tanggal]) perHari[d.tanggal] = 0;
    perHari[d.tanggal] += d.omset;
  });

  let labels = Object.keys(perHari);
  let values = Object.values(perHari);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Omset Harian',
        data: values,
        borderWidth: 2
      }]
    }
  });

  // History
  let list = "";
  filtered.slice().reverse().forEach(d => {
    list += `<li>${d.tanggal} - ${d.toko} - ${formatRupiah(d.omset)}</li>`;
  });

  document.getElementById("list").innerHTML = list;
}

render();
</script>

</body>
</html>
