<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:
  radial-gradient(circle at top left,#1e3a8a,#020617 40%),
  radial-gradient(circle at bottom right,#0f172a,#020617 50%);
  color:#e2e8f0;
  min-height:100vh;
  overflow-x:hidden;
}

#loginPage{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:420px;
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(15px);
  border-radius:24px;
  padding:30px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.login-title{
  font-size:32px;
  font-weight:700;
  margin-bottom:25px;
}

#app{
  display:none;
  opacity:0;
  transition:.3s;
  width:100%;
  min-height:100vh;
}

#app.show{
  display:flex;
  opacity:1;
}

.sidebar{
  width:260px;
  flex-shrink:0;
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(18px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:25px 18px;
  position:sticky;
  top:0;
  height:100vh;
}

.sidebar h3{
  font-size:26px;
  margin-bottom:35px;
  font-weight:700;
}

.menu{
  padding:14px 16px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
  color:#cbd5e1;
}

.menu:hover{
  background:rgba(59,130,246,.15);
  transform:translateX(4px);
}

.menu.active{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  color:white;
  box-shadow:0 10px 25px rgba(37,99,235,.35);
}

.main{
  flex:1;
  width:100%;
  min-width:0;
  padding:30px;
}

#userInfo{
  display:inline-block;
  margin-bottom:20px;
  padding:14px 18px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  font-size:14px;
}

.card{
  width:100%;
  background:rgba(15,23,42,.65);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(15px);
  padding:24px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:
  0 10px 30px rgba(0,0,0,.25),
  inset 0 1px 1px rgba(255,255,255,.04);
}

.card h3{
  margin-bottom:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.stat{
  position:relative;
  overflow:hidden;
  border-radius:22px;
  padding:28px;
  background:linear-gradient(135deg,rgba(59,130,246,.9),rgba(6,182,212,.8));
  box-shadow:0 15px 35px rgba(59,130,246,.25);
}

.stat::before{
  content:'';
  position:absolute;
  width:120px;
  height:120px;
  background:rgba(255,255,255,.08);
  border-radius:50%;
  top:-30px;
  right:-30px;
}

.stat h2{
  font-size:32px;
  margin-bottom:10px;
}

input,
select{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  outline:none;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:white;
  font-size:14px;
  border:1px solid transparent;
  transition:.2s;
}

input:focus,
select:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}

input::placeholder{
  color:#94a3b8;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:14px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  color:white;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
  transition:.25s;
  box-shadow:0 10px 20px rgba(37,99,235,.25);
}

button:hover{
  transform:translateY(-2px);
}

.table button{
  width:auto;
  padding:8px 12px;
  margin:0;
  font-size:12px;
}

.table-wrapper{
  overflow-x:auto;
}

.table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

.table thead{
  background:rgba(255,255,255,.05);
}

.table th,
.table td{
  padding:16px;
  font-size:14px;
}

.table td{
  border-bottom:1px solid rgba(255,255,255,.06);
}

.chart-box{
  position:relative;
  width:100%;
  height:320px;
}

canvas{
  width:100% !important;
  height:100% !important;
}

.small{
  font-size:13px;
  margin-top:10px;
  opacity:.7;
}

.hidden{
  display:none !important;
}

@media(max-width:900px){

  #app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
    display:flex;
    gap:10px;
    overflow-x:auto;
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .sidebar h3{
    display:none;
  }

  .menu{
    white-space:nowrap;
    margin:0;
  }

  .main{
    padding:16px;
  }

  .grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>
<body>

<div id="loginPage">

  <div class="login-card">

    <div class="login-title">
      Sales Pro Login
    </div>

    <input id="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">
      Login
    </button>

    <button onclick="register()">
      Register
    </button>

  </div>

</div>

<div id="app">

  <div class="sidebar">

    <h3>Sales Pro</h3>

    <div class="menu active" onclick="showPage('dashboard',this)">
      📊 Dashboard
    </div>

    <div class="menu" onclick="showPage('input',this)">
      ➕ Input
    </div>

    <div class="menu" onclick="showPage('laporan',this)">
      📑 Laporan
    </div>

    <div class="menu" onclick="logout()">
      🚪 Logout
    </div>

  </div>

  <div class="main">

    <div id="userInfo"></div>

    <!-- DASHBOARD -->

    <div id="dashboard">

      <div class="card">

        <input type="date" id="start" onchange="render()">

        <input type="date" id="end" onchange="render()">

        <select id="filterCabang" onchange="render()"></select>

      </div>

      <div class="grid">

        <div class="stat">
          <h2 id="total">Rp 0</h2>
          <p>Total Omset</p>
        </div>

        <div class="stat">
          <h2 id="trx">0</h2>
          <p>Total Transaksi</p>
        </div>

        <div class="stat">
          <h2 id="avg">Rp 0</h2>
          <p>Rata-rata Omset</p>
        </div>

      </div>

      <div class="grid">

        <div class="card">

          <h3>📈 Omset Harian</h3>

          <div class="chart-box">
            <canvas id="chart"></canvas>
          </div>

        </div>

        <div class="card">

          <h3>👤 Per Sales</h3>

          <div class="chart-box">
            <canvas id="chartSales"></canvas>
          </div>

        </div>

      </div>

    </div>

    <!-- INPUT -->

    <div id="input" class="hidden">

      <div class="card">

        <h3>Input Data Sales</h3>

        <input id="toko" placeholder="Nama Toko">

        <input type="date" id="tanggal">

        <input id="omset" type="number" placeholder="Nominal Omset">

        <select id="inputSales"></select>

        <div class="small">
          Sales aktif:
          <b id="infoCabang"></b>
        </div>

        <button onclick="simpan()">
          Simpan Data
        </button>

      </div>

      <div class="card" id="boxCabang" style="display:none">

        <h3>Tambah Sales</h3>

        <input id="newCabang" placeholder="Nama Sales">

        <button onclick="tambahCabang()">
          Tambah Sales
        </button>

      </div>

    </div>

    <!-- LAPORAN -->

    <div id="laporan" class="hidden">

      <div class="card">

        <div class="table-wrapper">

          <table class="table">

            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Toko</th>
                <th>Sales</th>
                <th>Omset</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody id="table"></tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>

<script>
  <!-- =========================
GANTI SELURUH <script> LAMA
DENGAN SCRIPT INI
========================= -->
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let data = [];
let role = "staff";
let userCabang = "";
let cabangList = [];
let chartInstance;
let chartSalesInstance;

window.onload = () => {

  tanggal.value =
  new Date()
  .toISOString()
  .split("T")[0];

};

auth.onAuthStateChanged(async user=>{

  if(user){

    loginPage.classList.add("hidden");
    app.classList.add("show");

    let doc = await db
    .collection("users")
    .doc(user.uid)
    .get();

    role = doc.data().role || "staff";

    userCabang =
    doc.data().cabang || "Sales 1";

    // NORMALISASI DATA LAMA
    if(
      userCabang === "" ||
      userCabang === "Cabang" ||
      userCabang === "Cabang A" ||
      userCabang === null ||
      userCabang === undefined
    ){
      userCabang = "Sales 1";
    }

    userInfo.innerText =
    user.email + " (" + role + ")";

    infoCabang.innerText = userCabang;

    boxCabang.style.display =
    role === "admin"
    ? "block"
    : "none";

    render();

  }else{

    loginPage.classList.remove("hidden");
    app.classList.remove("show");

  }

});

async function login(){

  try{

    await auth
    .signInWithEmailAndPassword(
      email.value,
      password.value
    );

  }catch(err){

    alert(err.message);

  }

}

async function register(){

  try{

    let user =
    await auth
    .createUserWithEmailAndPassword(
      email.value,
      password.value
    );

    let isAdmin =
    email.value.includes("admin");

    await db.collection("users")
    .doc(user.user.uid)
    .set({

      role:
      isAdmin
      ? "admin"
      : "staff",

      // DEFAULT SALES
      cabang:
      isAdmin
      ? "ALL"
      : "Sales 1"

    });

    alert("Register berhasil");

  }catch(err){

    alert(err.message);

  }

}

function logout(){

  auth.signOut();

}

function showPage(id,el){

  ["dashboard","input","laporan"]
  .forEach(x=>{

    document
    .getElementById(x)
    .classList.add("hidden");

  });

  document
  .getElementById(id)
  .classList.remove("hidden");

  document
  .querySelectorAll(".menu")
  .forEach(m=>
    m.classList.remove("active")
  );

  el.classList.add("active");

}

db.collection("cabang")
.onSnapshot(async snap=>{

  cabangList =
  snap.docs.map(d=>d.data().nama);

  // AUTO DEFAULT SALES
  if(cabangList.length === 0){

    await db.collection("cabang").add({
      nama:"Sales 1"
    });

    await db.collection("cabang").add({
      nama:"Sales 2"
    });

    return;

  }

  // NORMALISASI CABANG
  cabangList = cabangList.map(c=>{

    if(
      c === "" ||
      c === "Cabang" ||
      c === "Cabang A" ||
      c === null ||
      c === undefined
    ){
      return "Sales 1";
    }

    return c;

  });

  // HAPUS DUPLIKAT
  cabangList =
  [...new Set(cabangList)];

  inputSales.innerHTML =
  cabangList.map(c=>`
    <option value="${c}">
      ${c}
    </option>
  `).join("");

  if(role === "admin"){

    filterCabang.innerHTML =
    '<option value="">Semua Sales</option>' +

    cabangList.map(c=>`
      <option value="${c}">
        ${c}
      </option>
    `).join("");

  }else{

    filterCabang.innerHTML =
    `
    <option value="${userCabang}">
      ${userCabang}
    </option>
    `;

    filterCabang.disabled = true;

    inputSales.innerHTML =
    `
    <option value="${userCabang}">
      ${userCabang}
    </option>
    `;

  }

});

db.collection("sales")
.onSnapshot(async snap=>{

  data =
  snap.docs.map(d=>{

    let item = d.data();

    // NORMALISASI DATA LAMA
    if(
      item.cabang === "" ||
      item.cabang === "Cabang" ||
      item.cabang === "Cabang A" ||
      item.cabang === null ||
      item.cabang === undefined
    ){
      item.cabang = "Sales 1";
    }

    return{
      ...item,
      id:d.id
    };

  });

  render();

});

async function simpan(){

  if(
    !toko.value ||
    !tanggal.value ||
    !omset.value
  ){

    alert("Lengkapi data");
    return;

  }

  let selectedSales =
  role === "admin"
  ? inputSales.value
  : userCabang;

  // AUTO SALES 1
  if(
    selectedSales === "" ||
    selectedSales === "Cabang" ||
    selectedSales === "Cabang A" ||
    selectedSales === null ||
    selectedSales === undefined
  ){
    selectedSales = "Sales 1";
  }

  await db.collection("sales")
  .add({

    toko:toko.value,

    tanggal:tanggal.value,

    omset:Number(omset.value),

    cabang:selectedSales

  });

  toko.value = "";
  omset.value = "";

  alert("Data berhasil disimpan");

}

function render(){

  if(!filterCabang)
  return;

  let cab = filterCabang.value;

  let startDate = start.value;
  let endDate = end.value;

  let filtered =
  data.filter(d=>{

    // NORMALISASI
    if(
      d.cabang === "" ||
      d.cabang === "Cabang" ||
      d.cabang === "Cabang A"
    ){
      d.cabang = "Sales 1";
    }

    if(
      role !== "admin" &&
      d.cabang !== userCabang
    )
    return false;

    if(
      role === "admin" &&
      cab &&
      d.cabang !== cab
    )
    return false;

    if(
      startDate &&
      d.tanggal < startDate
    )
    return false;

    if(
      endDate &&
      d.tanggal > endDate
    )
    return false;

    return true;

  });

  let totalVal =
  filtered.reduce((a,b)=>
    a + b.omset
  ,0);

  total.innerText =
  rp(totalVal);

  trx.innerText =
  filtered.length;

  avg.innerText =
  rp(
    filtered.length
    ? totalVal / filtered.length
    : 0
  );

  // CHART HARIAN

  let perHari = {};

  filtered.forEach(d=>{

    perHari[d.tanggal] =
    (perHari[d.tanggal] || 0)
    + d.omset;

  });

  if(chartInstance)
  chartInstance.destroy();

  chartInstance =
  new Chart(chart,{

    type:'line',

    data:{
      labels:Object.keys(perHari),

      datasets:[{
        data:Object.values(perHari),
        borderWidth:3,
        tension:.4
      }]
    },

    options:{
      responsive:true,
      maintainAspectRatio:false
    }

  });

  // CHART SALES

  let perSales = {};

  filtered.forEach(d=>{

    perSales[d.cabang] =
    (perSales[d.cabang] || 0)
    + d.omset;

  });

  if(chartSalesInstance)
  chartSalesInstance.destroy();

  chartSalesInstance =
  new Chart(chartSales,{

    type:'bar',

    data:{
      labels:Object.keys(perSales),

      datasets:[{
        data:Object.values(perSales),
        borderRadius:10
      }]
    },

    options:{
      responsive:true,
      maintainAspectRatio:false
    }

  });

  // TABLE

  table.innerHTML =
  filtered.map(d=>`

    <tr>

      <td>${d.tanggal}</td>

      <td>${d.toko}</td>

      <td>${d.cabang}</td>

      <td>${rp(d.omset)}</td>

      <td>

      ${
        role === "admin"

        ? `
          <button onclick="del('${d.id}')">
            Hapus
          </button>
          `
        : "-"
      }

      </td>

    </tr>

  `).join("");

}

function rp(a){

  return "Rp " +
  Number(a || 0)
  .toLocaleString("id-ID");

}

async function del(id){

  if(role !== "admin")
  return;

  await db.collection("sales")
  .doc(id)
  .delete();

}

async function tambahCabang(){

  if(!newCabang.value){

    alert("Nama sales kosong");
    return;

  }

  // NORMALISASI
  let namaSales =
  newCabang.value.trim();

  if(
    namaSales === "Cabang" ||
    namaSales === "Cabang A"
  ){
    namaSales = "Sales 1";
  }

  await db.collection("cabang")
  .add({

    nama:namaSales

  });

  newCabang.value = "";

  alert("Sales berhasil ditambahkan");

}
                          
</script>

</body>
</html>
