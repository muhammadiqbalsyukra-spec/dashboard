<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Monitoring Tools</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color: #e2e8f0;
}

.container { padding: 15px; }

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

input, button, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  outline: none;
}

input, select {
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
}

.stats { display: flex; gap: 10px; }

.stat {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
}

.filter { display: flex; gap: 10px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td { padding: 10px; }

tr { border-bottom: 1px solid rgba(255,255,255,0.1); }

.action-btn {
  padding: 5px 8px;
  margin-right: 5px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

.edit { background: orange; }
.delete { background: red; }
.copy { background: green; }
</style>
</head>

<body>

<header>📊 Sales Monitoring Tools</header>

<div class="container">

<!-- INPUT -->
<div class="card">
  <h3>Input Penjualan</h3>
  <input type="text" id="toko" placeholder="Nama Toko">
  <input type="number" id="omset" placeholder="Omset">
  <button onclick="simpan()">Simpan</button>
</div>

<!-- TOOLS -->
<div class="card">
  <h3>🛠 Tools</h3>
  <select id="chartType" onchange="render()">
    <option value="line">Grafik Line</option>
    <option value="bar">Grafik Bar</option>
  </select>
  <button onclick="copyData()">Copy Data</button>
  <button onclick="pasteData()">Paste Data</button>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <p>Omset Hari Ini</p>
    <h3 id="totalOmset">Rp 0</h3>
  </div>
  <div class="stat">
    <p>EC Hari Ini</p>
    <h3 id="ec">0</h3>
  </div>
  <div class="stat">
    <p>Avg / Toko</p>
    <h3 id="avg">Rp 0</h3>
  </div>
</div>

<!-- FILTER -->
<div class="card">
  <h3>Filter</h3>
  <div class="filter">
    <input type="date" id="start">
    <input type="date" id="end">
  </div>
  <button onclick="render()">Terapkan</button>
</div>

<!-- GRAFIK -->
<div class="card">
  <h3>Grafik</h3>
  <canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
  <h3>Laporan</h3>
  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Toko</th>
        <th>Omset</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableData"></tbody>
  </table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("sales")) || [];
let chart;

// FORMAT
function formatRupiah(a){
  a = Number(a);
  if(isNaN(a)) return "Rp 0";
  return "Rp " + a.toLocaleString("id-ID");
}

// SIMPAN
function simpan(){
  let toko = document.getElementById("toko").value.trim();
  let omset = Number(document.getElementById("omset").value);

  if(!toko || isNaN(omset) || omset<=0){
    alert("Input salah!");
    return;
  }

  let tanggal = new Date().toISOString().split("T")[0];
  data.push({toko,omset,tanggal});

  localStorage.setItem("sales",JSON.stringify(data));
  render();
}

// EDIT
function editData(i){
  let d = data[i];
  let toko = prompt("Edit Toko", d.toko);
  let omset = prompt("Edit Omset", d.omset);

  if(!toko || isNaN(omset)) return;

  data[i].toko = toko;
  data[i].omset = Number(omset);

  localStorage.setItem("sales",JSON.stringify(data));
  render();
}

// DELETE
function deleteData(i){
  if(confirm("Hapus data?")){
    data.splice(i,1);
    localStorage.setItem("sales",JSON.stringify(data));
    render();
  }
}

// COPY
function copyData(){
  navigator.clipboard.writeText(JSON.stringify(data));
  alert("Data di-copy!");
}

// PASTE
function pasteData(){
  let input = prompt("Paste data JSON");
  try{
    let parsed = JSON.parse(input);
    data = parsed;
    localStorage.setItem("sales",JSON.stringify(data));
    render();
  }catch{
    alert("Format salah!");
  }
}

// RENDER
function render(){
  let today = new Date().toISOString().split("T")[0];

  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  let filtered = [...data];

  if(start && end){
    filtered = filtered.filter(d=>d.tanggal>=start && d.tanggal<=end);
  }

  filtered.sort((a,b)=>new Date(a.tanggal)-new Date(b.tanggal));

  let todayData = data.filter(d=>d.tanggal===today);

  let total = todayData.reduce((a,b)=>a+b.omset,0);
  let ec = todayData.length;
  let avg = ec ? Math.round(total/ec) : 0;

  document.getElementById("totalOmset").innerText = formatRupiah(total);
  document.getElementById("ec").innerText = ec;
  document.getElementById("avg").innerText = formatRupiah(avg);

  let perHari={};
  filtered.forEach(d=>{
    perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset;
  });

  let labels = Object.keys(perHari);
  let values = Object.values(perHari);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type: document.getElementById("chartType").value,
    data:{
      labels:labels,
      datasets:[{label:"Omset",data:values}]
    }
  });

  let rows="";
  filtered.slice().reverse().forEach((d,i)=>{
    rows+=`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${formatRupiah(d.omset)}</td>
      <td>
        <button class="action-btn edit" onclick="editData(${i})">Edit</button>
        <button class="action-btn delete" onclick="deleteData(${i})">Hapus</button>
      </td>
    </tr>`;
  });

  document.getElementById("tableData").innerHTML=rows;
}

render();
</script>

</body>
</html>
