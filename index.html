<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:
  radial-gradient(circle at top left,#1e3a8a,#020617 40%),
  radial-gradient(circle at bottom right,#0f172a,#020617 50%);
  color:#e2e8f0;
  min-height:100vh;
  overflow-x:hidden;
}

.hidden{
  display:none !important;
}

#loginPage{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-card,
.card{
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(15px);
  border-radius:24px;
  padding:24px;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.login-card{
  width:100%;
  max-width:420px;
}

#app{
  display:none;
}

#app.show{
  display:flex;
}

.sidebar{
  width:260px;
  min-height:100vh;
  padding:25px 18px;
  background:rgba(15,23,42,.75);
  border-right:1px solid rgba(255,255,255,.08);
}

.sidebar h3{
  margin-bottom:30px;
}

.menu{
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
}

.menu.active{
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.main{
  flex:1;
  padding:24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.stat{
  padding:24px;
  border-radius:22px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.stat h2{
  font-size:30px;
  margin-bottom:8px;
}

input,
select,
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:12px;
}

input,
select{
  background:rgba(255,255,255,.06);
  color:white;
}

button{
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th,
.table td{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.table-wrapper{
  overflow:auto;
}

.chart-box{
  height:340px;
}

canvas{
  width:100% !important;
  height:100% !important;
}

.progress-bar{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

.progress-fill{
  width:0%;
  height:100%;
  transition:1s;
  border-radius:999px;
}

.progress-red{
  background:#ef4444;
}

.progress-yellow{
  background:#f59e0b;
}

.progress-green{
  background:#22c55e;
}

.small{
  margin-top:10px;
  font-size:13px;
  opacity:.8;
}

#previewBox{
  margin-top:20px;
  overflow:auto;
  max-height:400px;
}

@media(max-width:900px){
  #app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    min-height:auto;
    display:flex;
    gap:10px;
    overflow:auto;
  }
}
</style></head>
<body><div id="loginPage">
  <div class="login-card"><h1 style="margin-bottom:20px;">
  Sales Login
</h1>

<input id="email" placeholder="Email">

<input
  id="password"
  type="password"
  placeholder="Password">

<button onclick="login()">
  Login
</button>

<button onclick="register()">
  Register
</button>

  </div>
</div><div id="app">  <div class="sidebar"><h3>IQBAL</h3>

<div class="menu active" onclick="showPage('dashboard',this)">
  📊 Dashboard
</div>

<div class="menu" onclick="showPage('input',this)">
  ➕ Input
</div>

<div class="menu" onclick="showPage('laporan',this)">
  📑 Laporan
</div>

<div class="menu" onclick="logout()">
  🚪 Logout
</div>

  </div>  <div class="main"><div id="dashboard">

  <div class="card">
    <select id="filterCabang" onchange="render()"></select>
  </div>

  <div class="grid">

    <div class="stat">
      <h2 id="total">Rp 0</h2>
      <p>Total Omset</p>
    </div>

    <div class="stat">
      <h2 id="trx">0</h2>
      <p>Total Transaksi</p>
    </div>

    <div class="stat">
      <h2 id="avg">Rp 0</h2>
      <p>Rata-rata Omset</p>
    </div>

    <div class="stat">
      <h2 id="targetCard">Rp 0</h2>
      <p>Target Bulanan</p>
    </div>

    <div class="stat">
      <h2 id="gapCard">Rp 0</h2>
      <p>Sisa Target</p>
    </div>

    <div class="stat">

      <h2 id="progressCard">0%</h2>
      <p>Progress Target</p>

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

    </div>

  </div>

  <div class="grid">

    <div class="card">

      <h3 style="margin-bottom:20px;">
        📊 Omset Harian
      </h3>

      <div class="chart-box">
        <canvas id="chart"></canvas>
      </div>

    </div>

    <div class="card">

      <h3 style="margin-bottom:20px;">
        👤 Per Sales
      </h3>

      <div class="chart-box">
        <canvas id="chartSales"></canvas>
      </div>

    </div>

  </div>

</div>

<div id="input" class="hidden">

  <div class="card">

    <h3>Input Data Sales</h3>

    <input id="toko" placeholder="Nama Toko">

    <input type="date" id="tanggal">

    <input id="omset" type="number" placeholder="Nominal Omset">

    <select id="inputSales"></select>

    <input type="file" id="notaFile" accept="image/*">

    <button onclick="scanNota()">
      📷 Scan Nota
    </button>

    <div id="scanStatus" class="small"></div>

    <button onclick="simpan()">
      Simpan Data
    </button>

  </div>

  <div class="card">

    <h3>📄 OCR Rekap Multi Toko</h3>

    <input type="file" id="rekapFile" accept="image/*">

    <button onclick="scanRekap()">
      🚀 Scan Rekap Sales
    </button>

    <div id="rekapStatus" class="small"></div>

    <div id="previewBox"></div>

    <button id="saveMassBtn" onclick="saveMassal()" class="hidden">
      💾 Simpan Semua Data
    </button>

  </div>

</div>

<div id="laporan" class="hidden">

  <div class="card table-wrapper">

    <table class="table">

      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Sales</th>
          <th>Omset</th>
          <th>Aksi</th>
        </tr>
      </thead>

      <tbody id="table"></tbody>

    </table>

  </div>

</div>

  </div></div><script>

const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let data = [];
let salesList = [];
let monthlyTarget = 0;
let hasilOCR = [];

let chartInstance;
let chartSalesInstance;

window.onload = ()=>{

  tanggal.value =
  new Date()
  .toISOString()
  .split("T")[0];

};

function showPage(id,el){

  ["dashboard","input","laporan"]
  .forEach(x=>{
    document
    .getElementById(x)
    .classList.add("hidden");
  });

  document
  .getElementById(id)
  .classList.remove("hidden");

  document
  .querySelectorAll(".menu")
  .forEach(m=>m.classList.remove("active"));

  el.classList.add("active");

}

async function login(){

  try{

    await auth.signInWithEmailAndPassword(
      email.value,
      password.value
    );

  }catch(err){

    alert(err.message);

  }

}

async function register(){

  try{

    await auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    );

    alert("Register berhasil");

  }catch(err){

    alert(err.message);

  }

}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{

  if(user){

    loginPage.classList.add("hidden");
    app.classList.add("show");

    render();

  }else{

    loginPage.classList.remove("hidden");
    app.classList.remove("show");

  }

});

db.collection("salesList")
.onSnapshot(async snap=>{

  salesList =
  snap.docs.map(d=>d.data().nama);

  if(salesList.length === 0){

    await db.collection("salesList").add({
      nama:"Sales 1"
    });

    await db.collection("salesList").add({
      nama:"Sales 2"
    });

    return;

  }

  inputSales.innerHTML =
  salesList.map(c=>`
    <option value="${c}">
      ${c}
    </option>
  `).join("");

  filterCabang.innerHTML =
  '<option value="">Semua Sales</option>' +
  salesList.map(c=>`
    <option value="${c}">
      ${c}
    </option>
  `).join("");

});

db.collection("targets")
.onSnapshot(snap=>{

  let bulanSekarang =
  new Date()
  .toISOString()
  .slice(0,7);

  monthlyTarget = 0;

  snap.docs.forEach(doc=>{

    let d = doc.data();

    if(d.bulan === bulanSekarang){
      monthlyTarget = Number(d.target || 0);
    }

  });

  render();

});

db.collection("sales")
.onSnapshot(snap=>{

  data = snap.docs.map(d=>({
    ...d.data(),
    id:d.id
  }));

  render();

});

async function scanNota(){

  const file = notaFile.files[0];

  if(!file){
    alert("Pilih foto nota dulu");
    return;
  }

  scanStatus.innerText =
  "Scanning nota...";

  try{

    const result =
    await Tesseract.recognize(file,'eng');

    const text = result.data.text;

    bacaNominal(text);

    scanStatus.innerText =
    "✅ Scan berhasil";

  }catch(err){

    scanStatus.innerText =
    "❌ Scan gagal";

  }

}

function bacaNominal(text){

  let angka =
  text.match(/\d+[.,]?\d+/g);

  if(!angka) return;

  let terbesar = 0;

  angka.forEach(a=>{

    let val = Number(
      a.replace(/\./g,'')
       .replace(',','')
    );

    if(val > terbesar){
      terbesar = val;
    }

  });

  if(terbesar > 0){
    omset.value = terbesar;
  }

}

async function scanRekap(){

  const file = rekapFile.files[0];

  if(!file){
    alert("Pilih file rekap dulu");
    return;
  }

  rekapStatus.innerText =
  "Scanning rekap sales...";

  try{

    const result =
    await Tesseract.recognize(file,'eng');

    const text = result.data.text;

    parseRekap(text);

    rekapStatus.innerText =
    "✅ Rekap berhasil dibaca";

  }catch(err){

    rekapStatus.innerText =
    "❌ OCR gagal";

  }

}

function parseRekap(text){

  hasilOCR = [];

  text.split("\n")
  .forEach(line=>{

    const nominalMatch =
    line.match(/(\d{1,3}(\.\d{3})+)/);

    if(!nominalMatch) return;

    const nominal = nominalMatch[0];

    const toko = line
    .replace(nominal,'')
    .replace(/[0-9]/g,'')
    .trim();

    if(toko.length < 3) return;

    hasilOCR.push({
      toko:toko,
      omset:Number(
        nominal.replace(/\./g,'')
      )
    });

  });

  renderPreview();

}

function renderPreview(){

  if(hasilOCR.length === 0){

    previewBox.innerHTML =
    "Tidak ada data";

    return;

  }

  saveMassBtn.classList.remove(
    "hidden"
  );

  previewBox.innerHTML = `

    <table class="table">

      <thead>
        <tr>
          <th>No</th>
          <th>Toko</th>
          <th>Omset</th>
        </tr>
      </thead>

      <tbody>

        ${hasilOCR.map((d,i)=>`

          <tr>
            <td>${i+1}</td>
            <td>${d.toko}</td>
            <td>${rp(d.omset)}</td>
          </tr>

        `).join('')}

      </tbody>

    </table>

  `;

}

async function saveMassal(){

  const tanggalHariIni =
  new Date()
  .toISOString()
  .split("T")[0];

  for(let d of hasilOCR){

    await db.collection("sales")
    .add({
      toko:d.toko,
      tanggal:tanggalHariIni,
      omset:d.omset,
      sales:inputSales.value
    });

  }

  hasilOCR = [];

  previewBox.innerHTML = "";

  saveMassBtn.classList.add(
    "hidden"
  );

  alert("Import selesai");

}

async function simpan(){

  if(
    !toko.value ||
    !tanggal.value ||
    !omset.value
  ){

    alert("Lengkapi data");
    return;

  }

  await db.collection("sales")
  .add({

    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    sales:inputSales.value

  });

  toko.value = "";
  omset.value = "";

  alert("Data berhasil disimpan");

}

function render(){

  let sales = filterCabang.value;

  let filtered = data.filter(d=>{

    if(sales && d.sales !== sales)
    return false;

    return true;

  });

  filtered.sort((a,b)=>
    new Date(b.tanggal)
    - new Date(a.tanggal)
  );

  let totalVal = filtered.reduce((a,b)=>
    a + b.omset
  ,0);

  total.innerText = rp(totalVal);

  trx.innerText = filtered.length;

  avg.innerText = rp(
    filtered.length
    ? totalVal / filtered.length
    : 0
  );

  let gap = monthlyTarget - totalVal;

  if(gap < 0) gap = 0;

  let progress = monthlyTarget
  ? Math.round((totalVal / monthlyTarget) * 100)
  : 0;

  targetCard.innerText = rp(monthlyTarget);
  gapCard.innerText = rp(gap);
  progressCard.innerText = progress + "%";

  progressFill.className =
  "progress-fill";

  if(progress < 50){
    progressFill.classList.add("progress-red");
  }
  else if(progress < 80){
    progressFill.classList.add("progress-yellow");
  }
  else{
    progressFill.classList.add("progress-green");
  }

  progressFill.style.width =
  progress + "%";

  let perHari = {};

  filtered.forEach(d=>{
    perHari[d.tanggal] =
    (perHari[d.tanggal] || 0)
    + d.omset;
  });

  let sortedTanggal =
  Object.keys(perHari)
  .sort((a,b)=>
    new Date(a)-new Date(b)
  );

  let sortedValues =
  sortedTanggal.map(t=>perHari[t]);

  if(chartInstance)
  chartInstance.destroy();

  chartInstance = new Chart(chart,{

    type:'bar',

    data:{

      labels:sortedTanggal,

      datasets:[{

        data:sortedValues,
        borderRadius:12,

        backgroundColor:
        sortedValues.map(v=>{

          if(v >= 10000000)
          return '#22c55e';

          if(v >= 5000000)
          return '#3b82f6';

          if(v >= 1000000)
          return '#f59e0b';

          return '#ef4444';

        })

      }]

    },

    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false}
      }
    }

  });

  let perSales = {};

  filtered.forEach(d=>{
    perSales[d.sales] =
    (perSales[d.sales] || 0)
    + d.omset;
  });

  if(chartSalesInstance)
  chartSalesInstance.destroy();

  chartSalesInstance =
  new Chart(chartSales,{

    type:'bar',

    data:{

      labels:Object.keys(perSales),

      datasets:[{

        data:Object.values(perSales),
        borderRadius:12,

        backgroundColor:
        Object.values(perSales)
        .map(v=>{

          if(v >= 10000000)
          return '#22c55e';

          if(v >= 5000000)
          return '#3b82f6';

          if(v >= 1000000)
          return '#f59e0b';

          return '#ef4444';

        })

      }]

    },

    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false}
      }
    }

  });

  table.innerHTML =
  filtered.map(d=>`

    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${d.sales}</td>
      <td>${rp(d.omset)}</td>
      <td>
        <button onclick="del('${d.id}')">
          Hapus
        </button>
      </td>
    </tr>

  `).join('');

}

function rp(a){

  return "Rp " +
  Number(a || 0)
  .toLocaleString('id-ID');

}

async function del(id){

  await db.collection("sales")
  .doc(id)
  .delete();

}

</script></body>
</html>
