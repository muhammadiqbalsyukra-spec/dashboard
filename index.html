<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(30,41,59,0.7);
  --primary:#3b82f6;
  --text:#e2e8f0;
}
body{
  margin:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
}
.sidebar{
  width:230px;
  background:rgba(2,6,23,0.8);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.menu{padding:12px;border-radius:10px;cursor:pointer;}
.menu:hover,.menu.active{background:var(--primary);}
.main{flex:1;padding:30px;}
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}
button{background:var(--primary);color:white;}
.hidden{display:none;}
.table{width:100%;}
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:10px;
  display:none;
}
.small{opacity:.8;font-size:12px}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div id="loginPage" class="main">
  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <div class="small">Tips: email mengandung "admin" = admin</div>
  </div>
</div>

<div id="app" class="hidden">

  <div class="sidebar">
    <div>
      <h3>Sales Pro</h3>
      <div class="menu active" onclick="show('dashboard',this)">Dashboard</div>
      <div class="menu" onclick="show('input',this)">Input</div>
      <div class="menu" onclick="show('laporan',this)">Laporan</div>
    </div>
    <div class="menu" onclick="logout()">Logout</div>
  </div>

  <div class="main">

    <div id="userInfo"></div>

    <div id="dashboard">
      <div class="card">
        <h3>Filter</h3>
        <input type="date" id="start" onchange="render()">
        <input type="date" id="end" onchange="render()">
        <select id="filterCabang" onchange="render()"></select>
      </div>

      <div class="card">
        <h2 id="total">Rp 0</h2>
        <div>Transaksi: <b id="trx">0</b></div>
        <div>Rata-rata: <b id="avg">Rp 0</b></div>
      </div>

      <div class="card">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div id="input" class="hidden">
      <div class="card">
        <input id="toko" placeholder="Toko">
        <input type="date" id="tanggal">
        <input id="omset" type="number" placeholder="Omset">
        <div class="small">Cabang: <b id="infoCabang"></b></div>
        <button id="btnSimpan" onclick="simpan()" disabled>Simpan</button>
      </div>
    </div>

    <div id="laporan" class="hidden">
      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>Tanggal</th><th>Toko</th><th>Cabang</th><th>Omset</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="table"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};
firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let data=[],role="staff",userCabang="Sales 1",chartInstance;

// LOGIN
async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

// REGISTER
async function register(){
  const user=await auth.createUserWithEmailAndPassword(email.value,password.value);
  const isAdmin=email.value.toLowerCase().includes("admin");
  await db.collection("users").doc(user.user.uid).set({
    role:isAdmin?"admin":"staff",
    cabang:isAdmin?"ALL":"Sales 1"
  });
}

// AUTH STATE (🔥 FIX ADMIN FINAL)
auth.onAuthStateChanged(async user=>{
  if(user){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");

    let ref = db.collection("users").doc(user.uid);
    let doc = await ref.get();

    const emailLogin = user.email.toLowerCase();

    // 🔥 GANTI DENGAN EMAIL KAMU
    const isAdminEmail = emailLogin === "muhammadiqbalsyukra@gmail.com";

    if(!doc.exists){
      await ref.set({
        role: isAdminEmail ? "admin" : "staff",
        cabang: isAdminEmail ? "ALL" : "Sales 1"
      });
    }

    let dataUser = (await ref.get()).data();

    if(isAdminEmail){
      role = "admin";
      userCabang = "ALL";

      await ref.set({
        role: "admin",
        cabang: "ALL"
      });
    }else{
      role = dataUser.role || "staff";
      userCabang = dataUser.cabang || "Sales 1";
    }

    userInfo.innerText=user.email+" ("+role+")";
    infoCabang.innerText=userCabang;

    btnSimpan.disabled=false;

    render();

  }else{
    loginPage.classList.remove("hidden");
    app.classList.add("hidden");
  }
});

function logout(){auth.signOut();}

// NAV
function show(id){
  ["dashboard","input","laporan"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// DATA REALTIME
db.collection("sales").onSnapshot(snap=>{
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
});

// SIMPAN
async function simpan(){
  await db.collection("sales").add({
    toko:toko.value,
    tanggal:tanggal.value,
    omset:Number(omset.value),
    cabang:role==="admin"?"ALL":userCabang
  });
}

// FORMAT
function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

// RENDER
function render(){
  let f=data.filter(d=>{
    if(role!=="admin" && d.cabang!==userCabang) return false;
    return true;
  });

  let totalVal=f.reduce((a,b)=>a+(b.omset||0),0);
  total.innerText=rp(totalVal);

  table.innerHTML=f.map(d=>`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${d.cabang}</td>
      <td>${rp(d.omset)}</td>
      <td>${role==="admin"?`<button onclick="del('${d.id}')">Hapus</button>`:"-"}</td>
    </tr>
  `).join("");
}

// DELETE
async function del(id){
  if(role!=="admin") return;
  await db.collection("sales").doc(id).delete();
}
</script>

</body>
</html>
