<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE COMPAT (PENTING) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#020617;
  color:#e2e8f0;
  display:flex;
}

.sidebar{
  width:220px;
  background:#0f172a;
  padding:20px;
  height:100vh;
}

.menu{
  padding:10px;
  margin:5px 0;
  cursor:pointer;
  border-radius:8px;
}
.menu:hover{background:#3b82f6;}

.main{flex:1;padding:20px;}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input,button,select{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{background:#3b82f6;color:white;}

.hidden{display:none;}

.stats{display:flex;gap:10px;}
.stat{flex:1;text-align:center;}

table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #333;}
</style>
</head>

<body>

<div class="sidebar">
  <h3>📊 Sales</h3>
  <div class="menu" onclick="show('input')">Input</div>
  <div class="menu" onclick="show('tools')">Tools</div>
  <div class="menu" onclick="show('grafik')">Grafik</div>
  <div class="menu" onclick="show('filter')">Filter</div>
  <div class="menu" onclick="show('laporan')">Laporan</div>
  <div class="menu" onclick="show('bulanan')">Bulanan</div>
</div>

<div class="main">

<!-- INPUT -->
<div id="input" class="section">
  <div class="card">
    <h3>Input</h3>
    <input id="toko" placeholder="Toko">
    <input type="date" id="tanggal">
    <input id="omset" type="number" placeholder="Omset">
    <button onclick="simpan()">Simpan</button>
  </div>

  <div class="stats">
    <div class="card stat">
      <p>Omset Hari Ini</p>
      <h3 id="total">Rp 0</h3>
    </div>
    <div class="card stat">
      <p>EC</p>
      <h3 id="ec">0</h3>
    </div>
    <div class="card stat">
      <p>Avg</p>
      <h3 id="avg">Rp 0</h3>
    </div>
  </div>
</div>

<!-- TOOLS -->
<div id="tools" class="section hidden">
  <div class="card">
    <h3>Tools</h3>
    <button onclick="toggleEdit()">Mode Edit</button>
    <select id="chartType" onchange="render()">
      <option value="line">Line</option>
      <option value="bar">Bar</option>
    </select>
  </div>
</div>

<!-- GRAFIK -->
<div id="grafik" class="section hidden">
  <div class="card">
    <h3>Grafik</h3>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- FILTER -->
<div id="filter" class="section hidden">
  <div class="card">
    <input type="date" id="start">
    <input type="date" id="end">
    <button onclick="render()">Filter</button>
  </div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="section hidden">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Toko</th>
          <th>Omset</th>
          <th id="aksiHead" class="hidden">Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<!-- BULANAN -->
<div id="bulanan" class="section hidden">
  <div class="card">
    <h3>Bulanan</h3>
    <select id="bulan" onchange="renderBulanan()"></select>

    <h4 id="totalB"></h4>
    <h4 id="ecB"></h4>
    <h4 id="avgB"></h4>

    <canvas id="chartB"></canvas>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
  authDomain: "gudang-app-pro.firebaseapp.com",
  projectId: "gudang-app-pro",
  storageBucket: "gudang-app-pro.firebasestorage.app",
  messagingSenderId: "795043382766",
  appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let data=[];
let chart,chartB;
let editMode=false;

document.getElementById("tanggal").value=new Date().toISOString().split("T")[0];

// NAV
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// FORMAT
function rp(a){return "Rp "+Number(a||0).toLocaleString("id-ID");}

// LOAD DATA CLOUD
async function loadData(){
  let snap=await db.collection("sales").get();
  data=snap.docs.map(d=>({...d.data(),id:d.id}));
  render();
}

// SIMPAN
async function simpan(){
  let toko=toko.value;
  let tanggal=document.getElementById("tanggal").value;
  let omset=Number(document.getElementById("omset").value);

  if(!toko||!tanggal||!omset)return alert("Lengkapi");

  await db.collection("sales").add({toko,tanggal,omset});
  loadData();
}

// EDIT MODE
function toggleEdit(){
  editMode=!editMode;
  aksiHead.classList.toggle("hidden",!editMode);
  render();
}

// DELETE
async function del(id){
  if(confirm("hapus?")){
    await db.collection("sales").doc(id).delete();
    loadData();
  }
}

// RENDER HARIAN
function render(){
  let today=new Date().toISOString().split("T")[0];
  let tData=data.filter(d=>d.tanggal===today);

  let total=tData.reduce((a,b)=>a+b.omset,0);
  let ec=tData.length;
  let avg=ec?Math.round(total/ec):0;

  total.innerText=rp(total);
  ec.innerText=ec;
  avg.innerText=rp(avg);

  let perHari={};
  data.forEach(d=>{
    perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset;
  });

  let labels=Object.keys(perHari);
  let values=Object.values(perHari);

  if(chart) chart.destroy();

  chart=new Chart(chart,{
    type:chartType.value,
    data:{labels,datasets:[{data:values}]}
  });

  let rows="";
  data.forEach(d=>{
    rows+=`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.toko}</td>
      <td>${rp(d.omset)}</td>
      ${editMode?`<td><button onclick="del('${d.id}')">Hapus</button></td>`:""}
    </tr>`;
  });

  table.innerHTML=rows;
}

// BULANAN
function renderBulanan(){
  let b=bulan.value;
  let f=data.filter(d=>new Date(d.tanggal).getMonth()==b);

  let total=f.reduce((a,b)=>a+b.omset,0);
  let ec=f.length;
  let avg=ec?Math.round(total/ec):0;

  totalB.innerText="Total "+rp(total);
  ecB.innerText="EC "+ec;
  avgB.innerText="Avg "+rp(avg);

  let perHari={};
  f.forEach(d=>perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset);

  let labels=Object.keys(perHari);
  let values=Object.values(perHari);

  if(chartB) chartB.destroy();

  chartB=new Chart(chartB,{
    type:'line',
    data:{labels,datasets:[{data:values}]}
  });
}

// INIT BULAN
for(let i=0;i<12;i++){
  bulan.innerHTML+=`<option value="${i}">${i+1}</option>`;
}

loadData();
</script>

</body>
</html>
