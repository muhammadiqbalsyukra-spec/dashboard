<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Cloud Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#020617;
  color:#e2e8f0;
  display:flex;
}

.sidebar{
  width:220px;
  padding:20px;
  background:#0f172a;
}

.menu{
  padding:10px;
  cursor:pointer;
}

.menu:hover{background:#3b82f6;}

.main{flex:1;padding:20px;}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input,button,select{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{background:#3b82f6;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="sidebar">
  <h3>📊 Sales</h3>
  <div class="menu" onclick="show('input')">Input</div>
  <div class="menu" onclick="show('bulanan')">Bulanan</div>
</div>

<div class="main">

<div id="input">
  <div class="card">
    <h3>Input</h3>
    <input id="toko" placeholder="Toko">
    <input id="tanggal" type="date">
    <input id="omset" type="number">
    <button onclick="simpan()">Simpan</button>
  </div>
</div>

<div id="bulanan" class="hidden">
  <div class="card">
    <h3>Laporan Bulanan</h3>
    <select id="bulan" onchange="loadBulanan()">
      <option value="0">Jan</option>
      <option value="1">Feb</option>
      <option value="2">Mar</option>
      <option value="3">Apr</option>
      <option value="4">Mei</option>
      <option value="5">Jun</option>
      <option value="6">Jul</option>
      <option value="7">Agu</option>
      <option value="8">Sep</option>
      <option value="9">Okt</option>
      <option value="10">Nov</option>
      <option value="11">Des</option>
    </select>

    <h4 id="totalBulanan">Total: Rp 0</h4>
    <h4 id="ecBulanan">EC: 0</h4>
    <h4 id="avgBulanan">Avg: Rp 0</h4>

    <canvas id="chartBulanan"></canvas>
  </div>
</div>

</div>

<script>
// CONFIG (GANTI PUNYAMU)
const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data=[];
let chart;

// NAV
function show(id){
  document.getElementById("input").classList.add("hidden");
  document.getElementById("bulanan").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

// SIMPAN
async function simpan(){
  let toko=document.getElementById("toko").value;
  let tanggal=document.getElementById("tanggal").value;
  let omset=Number(document.getElementById("omset").value);

  if(!toko||!tanggal||!omset) return alert("Lengkapi");

  await db.collection("sales").add({toko,tanggal,omset});

  alert("Tersimpan ke cloud");
  loadData();
}

// LOAD DATA
async function loadData(){
  let snap=await db.collection("sales").get();
  data=snap.docs.map(d=>d.data());
}

// LAPORAN BULANAN
function loadBulanan(){
  let bulan=parseInt(document.getElementById("bulan").value);

  let filtered=data.filter(d=>new Date(d.tanggal).getMonth()===bulan);

  let total=filtered.reduce((a,b)=>a+b.omset,0);
  let ec=filtered.length;
  let avg=ec?Math.round(total/ec):0;

  document.getElementById("totalBulanan").innerText="Total: Rp "+total.toLocaleString("id-ID");
  document.getElementById("ecBulanan").innerText="EC: "+ec;
  document.getElementById("avgBulanan").innerText="Avg: Rp "+avg.toLocaleString("id-ID");

  let perHari={};
  filtered.forEach(d=>{
    perHari[d.tanggal]=(perHari[d.tanggal]||0)+d.omset;
  });

  let labels=Object.keys(perHari);
  let values=Object.values(perHari);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chartBulanan"),{
    type:'line',
    data:{
      labels,
      datasets:[{label:'Omset',data:values}]
    }
  });
}

// INIT
document.getElementById("tanggal").value=new Date().toISOString().split("T")[0];
loadData();

</script>

</body>
</html>
