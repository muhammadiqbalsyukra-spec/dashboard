<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Dashboard Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left,#1e3a8a,#020617 40%),
radial-gradient(circle at bottom right,#0f172a,#020617 60%);
color:#e2e8f0;
min-height:100vh;
overflow-x:hidden;
}

.hidden{
display:none !important;
}

button,
input,
select{
font-family:'Inter',sans-serif;
}

#loginPage{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card,
.card{
background:rgba(15,23,42,.78);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:24px;
padding:24px;
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.login-card{
width:100%;
max-width:420px;
}

.login-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

input,
select,
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:12px;
font-size:15px;
}

input,
select{
background:rgba(255,255,255,.08);
color:white;
outline:none;
}

input::placeholder{
color:#cbd5e1;
}

button{
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(135deg,#2563eb,#06b6d4);
transition:.2s;
}

button:hover{
transform:translateY(-1px);
opacity:.95;
}

button:active{
transform:scale(.98);
}

#app{
display:none;
}

#app.show{
display:flex;
}

.sidebar{
width:260px;
min-height:100vh;
padding:24px 18px;
background:rgba(15,23,42,.78);
border-right:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:30px;
}

.menu{
padding:14px;
border-radius:14px;
margin-bottom:10px;
cursor:pointer;
transition:.25s ease;
}

.menu:hover{
background:rgba(255,255,255,.06);
}

.menu.active{
background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.main{
flex:1;
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:20px;
}

.stat{
padding:24px;
border-radius:24px;
background:linear-gradient(135deg,#2563eb,#06b6d4);
transition:.25s ease;
}

.stat:hover{
transform:translateY(-2px);
box-shadow:0 20px 35px rgba(0,0,0,.25);
}

.stat h2{
font-size:30px;
margin-bottom:8px;
}

.card{
transition:.25s ease;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 20px 35px rgba(0,0,0,.25);
}

.chart-box{
height:340px;
}

canvas{
width:100% !important;
height:100% !important;
}

.table-wrapper{
overflow:auto;
border-radius:20px;
}

.table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

.table th,
.table td{
padding:14px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.06);
}

.table th{
background:rgba(255,255,255,.04);
}

.progress-bar{
width:100%;
height:12px;
background:rgba(255,255,255,.12);
border-radius:999px;
overflow:hidden;
margin-top:12px;
}

.progress-fill{
height:100%;
width:0%;
transition:1s;
border-radius:999px;
}

.progress-red{
background:#ef4444;
}

.progress-yellow{
background:#f59e0b;
}

.progress-green{
background:#22c55e;
}

.small{
margin-top:12px;
font-size:13px;
opacity:.8;
}

#previewBox{
margin-top:20px;
overflow:auto;
max-height:400px;
}

input:focus,
select:focus{
outline:none;
border:1px solid rgba(59,130,246,.5);
box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

::-webkit-scrollbar{
height:8px;
width:8px;
}

::-webkit-scrollbar-track{
background:rgba(255,255,255,.05);
}

::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.18);
border-radius:999px;
}

@media(max-width:900px){

#app{
flex-direction:column;
}

.sidebar{
width:100%;
min-height:auto;
padding:12px;
display:flex;
gap:10px;
overflow-x:auto;
position:sticky;
top:0;
z-index:999;
border-right:none;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
display:none;
}

.menu{
min-width:max-content;
margin-bottom:0;
font-size:14px;
padding:12px 16px;
white-space:nowrap;
flex-shrink:0;
}

.main{
padding:14px;
}

.grid{
grid-template-columns:1fr;
gap:14px;
}

.stat{
padding:20px;
border-radius:22px;
}

.stat h2{
font-size:24px;
}

.card{
padding:18px;
border-radius:22px;
}

.chart-box{
height:260px;
}

input,
select,
button{
font-size:16px;
padding:16px;
}

.table{
min-width:650px;
}

.table th,
.table td{
padding:12px;
font-size:13px;
}

.login-card{
padding:22px;
border-radius:24px;
}

}

@media(max-width:480px){

body{
font-size:14px;
}

.login-card,
.card,
.stat{
border-radius:20px;
}

.login-title{
font-size:24px;
}

.stat h2{
font-size:22px;
}

.chart-box{
height:220px;
}

button{
font-size:15px;
}

.main{
padding:12px;
}

.sidebar{
padding:10px;
gap:8px;
}

.menu{
padding:10px 14px;
font-size:13px;
}

.table th,
.table td{
font-size:12px;
padding:10px;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<form class="login-card" onsubmit="event.preventDefault(); login();">

<div class="login-title">
Sales Dashboard
</div>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button type="submit">
Login
</button>

<button type="button" onclick="register()">
Register
</button>

</form>

</div>

<!-- APP -->

<div id="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
IQBAL
</div>

<div class="menu active" onclick="showPage('dashboard',this)">
📊 Dashboard
</div>

<div class="menu" onclick="showPage('input',this)">
➕ Input
</div>

<div class="menu" onclick="showPage('laporan',this)">
📑 Laporan
</div>

<div class="menu" onclick="logout()">
🚪 Logout
</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard">

<div class="card" style="margin-bottom:20px;">
<select id="filterCabang" onchange="render()"></select>
</div>

<div class="grid">

<div class="stat">
<h2 id="total">Rp 0</h2>
<p>Total Omset</p>
</div>

<div class="stat">
<h2 id="trx">0</h2>
<p>Total Transaksi</p>
</div>

<div class="stat">
<h2 id="avg">Rp 0</h2>
<p>Rata-rata Omset</p>
</div>

<div class="stat">
<h2 id="targetCard">Rp 0</h2>
<p>Target Bulanan</p>
</div>

<div class="stat">
<h2 id="gapCard">Rp 0</h2>
<p>Sisa Target</p>
</div>

<div class="stat">

<h2 id="progressCard">0%</h2>
<p>Progress Target</p>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

</div>

</div>

<div class="grid">

<div class="card">

<h3 style="margin-bottom:20px;">
📊 Omset Harian
</h3>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<div class="card">

<h3 style="margin-bottom:20px;">
👤 Per Sales
</h3>

<div class="chart-box">
<canvas id="chartSales"></canvas>
</div>

</div>

</div>

</div>

<!-- INPUT -->

<div id="input" class="hidden">

<div class="card" style="margin-bottom:20px;">

<h3 style="margin-bottom:20px;">
Input Data Sales
</h3>

<input id="toko" placeholder="Nama Toko">

<input type="date" id="tanggal">

<input id="omset" type="number" placeholder="Nominal Omset">

<select id="inputSales"></select>

<input type="file" id="notaFile" accept="image/*">

<button onclick="scanNota()">
📷 Scan Nota
</button>

<div id="scanStatus" class="small"></div>

<button onclick="simpan()">
💾 Simpan Data
</button>

</div>

<div class="card">

<h3 style="margin-bottom:20px;">
📄 OCR Rekap Multi Toko
</h3>

<input type="file" id="rekapFile" accept="image/*">

<button onclick="scanRekap()">
🚀 Scan Rekap Sales
</button>

<div id="rekapStatus" class="small"></div>

<div id="previewBox"></div>

<button id="saveMassBtn" class="hidden" onclick="saveMassal()">
💾 Simpan Semua Data
</button>

</div>

</div>

<!-- LAPORAN -->

<div id="laporan" class="hidden">

<div class="card table-wrapper">

<table class="table">

<thead>
<tr>
<th>Tanggal</th>
<th>Toko</th>
<th>Sales</th>
<th>Omset</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

</div>
</div>

<script>

/* =========================
FIREBASE
========================= */

const firebaseConfig = {
apiKey: "AIzaSyC-dtWEgB6FcHeVqD5PfzC_AFZoZ0eXRtI",
authDomain: "gudang-app-pro.firebaseapp.com",
projectId: "gudang-app-pro",
storageBucket: "gudang-app-pro.appspot.com",
messagingSenderId: "795043382766",
appId: "1:795043382766:web:9d908c909fb6a2774dfaff"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* =========================
GLOBAL
========================= */

let data = [];
let salesList = [];
let hasilOCR = [];
let monthlyTarget = 0;

let chartInstance = null;
let chartSalesInstance = null;

/* =========================
INIT
========================= */

window.onload = () => {

tanggal.value = new Date()
.toISOString()
.split("T")[0];

};

/* =========================
UTILS
========================= */

function rp(n){

return "Rp " + Number(n || 0)
.toLocaleString("id-ID");

}

function userSales(){

return db.collection("sales");

}

/* =========================
MENU
========================= */

function showPage(id,el){

["dashboard","input","laporan"]
.forEach(page=>{

document
.getElementById(page)
.classList.add("hidden");

});

document
.getElementById(id)
.classList.remove("hidden");

document
.querySelectorAll(".menu")
.forEach(m=>m.classList.remove("active"));

el.classList.add("active");

}

/* =========================
AUTH
========================= */

async function login(){

const email = document
.getElementById("email")
.value
.trim();

const password = document
.getElementById("password")
.value
.trim();

if(!email || !password){

alert("Lengkapi email & password");
return;

}

try{

await auth.signInWithEmailAndPassword(
email,
password
);

alert("Login berhasil");

}catch(err){

alert(err.message);
console.log(err);

}

}

async function register(){

const email = document
.getElementById("email")
.value
.trim();

const password = document
.getElementById("password")
.value
.trim();

if(!email || !password){

alert("Lengkapi email & password");
return;

}

try{

await auth.createUserWithEmailAndPassword(
email,
password
);

alert("Register berhasil");

}catch(err){

alert(err.message);
console.log(err);

}

}

function logout(){

auth.signOut();

}

/* =========================
AUTH STATE
========================= */

auth.onAuthStateChanged(user=>{

if(user){

loginPage.classList.add("hidden");
app.classList.add("show");

loadData();

}else{

loginPage.classList.remove("hidden");
app.classList.remove("show");

}

});

/* LANJUTKAN SCRIPT LAMA KAMU DI SINI TANPA DIUBAH */

</script>

</body>
</html>
